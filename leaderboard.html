<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 榮譽排行榜</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c1220;
            --surface: #1a2236;
            --surface2: #212d45;
            --border: #2e3f5c;
            --accent: #38bdf8;
            --purple: #a78bfa;
            --gold: #fbbf24;
            --silver: #cbd5e1;
            --bronze: #b45309;
            --text: #e2e8f0;
            --muted: #64748b;
        }
        body { margin: 0; padding: 20px; font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { margin: 0; font-size: 2.2rem; background: linear-gradient(90deg, var(--gold), #fef3c7); background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .subtitle { color: var(--muted); margin-top: 10px; }
        
        .filter-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 12px; display: flex; gap: 15px; align-items: flex-end; margin-bottom: 30px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 200px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--muted); }
        .form-group select { width: 100%; padding: 10px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 1rem; outline: none; }
        .btn-query { background: linear-gradient(90deg, var(--accent), var(--purple)); color: #fff; border: none; padding: 11px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .btn-query:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-home { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; text-decoration: none; display: inline-block; margin-top: 20px; transition: 0.2s; }
        .btn-home:hover { background: var(--surface2); color: var(--text); }

        .leaderboard-list { display: flex; flex-direction: column; gap: 10px; }
        .rank-item { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); padding: 15px 20px; border-radius: 12px; transition: transform 0.2s; }
        .rank-item:hover { transform: translateX(5px); border-color: var(--accent); }
        .rank-num { font-size: 1.5rem; font-weight: 900; width: 40px; text-align: center; margin-right: 15px; color: var(--muted); }
        
        /* Top 3 Styles */
        .rank-item[data-rank="1"] { border-color: var(--accent); background: linear-gradient(90deg, rgba(251,191,36,0.1), var(--surface)); }
        .rank-item[data-rank="1"] .rank-num { color: var(--accent); font-size: 2rem; }
        .rank-item[data-rank="2"] { border-color: var(--silver); background: linear-gradient(90deg, rgba(203,213,225,0.05), var(--surface)); }
        .rank-item[data-rank="2"] .rank-num { color: var(--silver); font-size: 1.8rem; }
        .rank-item[data-rank="3"] { border-color: var(--bronze); background: linear-gradient(90deg, rgba(180,83,9,0.05), var(--surface)); }
        .rank-item[data-rank="3"] .rank-num { color: var(--bronze); font-size: 1.6rem; }

        .player-info { flex: 1; }
        .player-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
        .player-class { font-size: 0.85rem; color: var(--muted); }
        .score-info { font-size: 1.5rem; font-weight: 900; color: var(--purple); text-align: right; }
        .score-label { font-size: 0.8rem; color: var(--muted); display: block; font-weight: 400; }
        
        .empty-state { text-align: center; padding: 50px; color: var(--muted); background: var(--surface); border-radius: 12px; border: 1px dashed var(--border); }

        .top-nav { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .top-nav a { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); text-decoration: none; font-size: 0.9rem; transition: 0.2s; }
        .top-nav a:hover { border-color: var(--accent); background: var(--surface2); transform: translateY(-2px); }
        .top-nav .nav-icon { font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <nav class="top-nav">
        <a href="index.html"><span class="nav-icon">🏠</span> 首頁</a>
        <a href="pages/map.html"><span class="nav-icon">🗺️</span> 關卡地圖</a>
    </nav>

    <header>
        <h1>🏆 綜合英雄風雲榜</h1>
        <div class="subtitle">累積通關次數與星星，證明你的全能實力！</div>
        <div id="motivational-quote" style="margin-top: 15px; font-size: 0.95rem; color: rgba(255,255,255,0.9); font-style: italic; width: fit-content; max-width: 90vw; margin-left: auto; margin-right: auto; text-align: center; line-height: 1.5; padding: 12px 20px; background: rgba(255,255,255,0.06); border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); text-wrap: balance; word-break: keep-all;"></div>
    </header>

    <div class="filter-card">
        <div class="form-group">
            <label>篩選班級</label>
            <select id="sel-class">
                <option value="ALL">全站群雄並起</option>
                <option value="資訊二">資訊二</option>
                <option value="電子二">電子二</option>
            </select>
        </div>
        <button class="btn-query" id="btn-search">刷新排行榜</button>
    </div>

    <div class="leaderboard-list" id="leaderboard-container">
        <!-- Ranks will be injected here -->
        <div class="empty-state">資料讀取中，請稍候...</div>
    </div>

</div>

<script type="module" src="js/api.js?v=10"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const btnSearch = document.getElementById('btn-search');
    
    // 等待 API 模組載入
    setTimeout(() => {
        if (typeof window.getOverallRanking !== 'function') {
            console.warn("API 模組尚未準備好！");
             document.getElementById('leaderboard-container').innerHTML = '<div class="empty-state" style="color:var(--danger);">無法連線至雲端系統 (API 未就緒)</div>';
        } else {
            fetchAndRender();
        }
    }, 800);

    btnSearch.addEventListener('click', fetchAndRender);
    document.getElementById('sel-class').addEventListener('change', fetchAndRender);
});

async function fetchAndRender() {
    const btnSearch = document.getElementById('btn-search');
    const container = document.getElementById('leaderboard-container');
    const classFilter = document.getElementById('sel-class').value;

    btnSearch.textContent = "刷新中...";
    btnSearch.disabled = true;
    container.innerHTML = '<div class="empty-state">系統撈取彙整資料中，請稍候... (Firebase)</div>';

    function formatTime(totalSeconds) {
        if (!totalSeconds) return "0 秒";
        const h = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = totalSeconds % 60;
        let p = [];
        if (h > 0) p.push(`${h} 小時`);
        if (m > 0 || h > 0) p.push(`${m} 分`);
        p.push(`${s} 秒`);
        return p.join(' ');
    }

    try {
        const data = await window.getOverallRanking(classFilter);
        
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="empty-state">😭 目前尚無通關紀錄，趕緊成為榜單第一人吧！</div>';
            return;
        }

        container.innerHTML = '';
        data.forEach((record, index) => {
            const rank = index + 1;

            container.innerHTML += `
                <div class="rank-item" data-rank="${rank}">
                    <div class="rank-num">${rank <= 3 ? ['🥇', '🥈', '🥉'][rank-1] : rank}</div>
                    <div class="player-info">
                        <div class="player-name">${record.userName || '匿名英雄'}</div>
                        <div class="player-class"><span style="color:var(--accent)">${record.className || '-'}</span> &nbsp;&bull;&nbsp; <span style="color:#94a3b8;">總耗時 ${formatTime(record.totalBestTime)}</span></div>
                    </div>
                    <div class="score-info" style="display: flex; gap: 20px;">
                        <div style="text-align: center;">
                            <div style="color: var(--accent);">⭐ ${record.stars} <span style="font-size:0.8rem; font-weight:normal;">顆星</span></div>
                            <div class="score-label">總星星數</div>
                        </div>
                        <div style="text-align: center;">
                            <div>${record.uniqueClears} <span style="font-size:0.8rem; font-weight:normal;">關</span></div>
                            <div class="score-label">破關數</div>
                        </div>
                    </div>
                </div>
            `;
        });
    } catch(e) {
        console.error("讀取排行榜失敗:", e);
        container.innerHTML = '<div class="empty-state" style="color:var(--danger)">讀取排行榜發生異常，請確認網路與金鑰。</div>';
    } finally {
        btnSearch.textContent = "刷新排行榜";
        btnSearch.disabled = false;
    }
}
</script>
<script src="js/quotes.js"></script>
</body>
</html>
