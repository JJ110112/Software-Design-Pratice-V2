<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>軟體設計丙級 VB.NET 術科互動練習系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c1220;
  --surface: #1a2236;
  --surface2: #212d45;
  --border: #2e3f5c;
  --accent: #38bdf8;
  --purple: #a78bfa;
  --green: #4ade80;
  --gold: #fbbf24;
  --text: #e2e8f0;
  --muted: #64748b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Animated grid background */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(56,189,248,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Floating particles */
.particles {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 4px; height: 4px;
  background: var(--accent);
  border-radius: 50%;
  opacity: 0;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0%   { opacity: 0; transform: translateY(100vh) scale(0); }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(-10vh) scale(1); }
}

.container {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 40px 20px;
}

/* Top bar */
.top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding: 16px 24px;
  z-index: 100;
  gap: 10px;
}
.btn-sm {
  padding: 8px 16px;
  background: rgba(33, 45, 69, 0.8);
  backdrop-filter: blur(4px);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 700;
}
.btn-sm:hover {
  background: rgba(56, 189, 248, 0.1);
  border-color: var(--accent);
  color: var(--accent);
}

/* Title */
h1 {
  font-size: clamp(2rem, 6vw, 3.2rem);
  font-weight: 900;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #38bdf8, #a78bfa, #f472b6);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.02em;
}
.subtitle {
  color: var(--muted);
  font-size: 1rem;
  margin-bottom: 50px;
}

/* Big Play Button */
.play-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin-bottom: 40px;
}
.play-btn {
  position: relative;
  width: 140px; height: 140px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    0 0 0 0 rgba(56, 189, 248, 0.4),
    0 8px 30px rgba(56, 189, 248, 0.3),
    0 4px 15px rgba(0,0,0,0.4);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  animation: playPulse 2.5s ease-in-out infinite;
}
.play-btn:hover {
  transform: scale(1.12);
  box-shadow:
    0 0 0 12px rgba(56, 189, 248, 0.15),
    0 12px 40px rgba(56, 189, 248, 0.5),
    0 4px 15px rgba(0,0,0,0.4);
}
.play-btn:active {
  transform: scale(0.96);
}

/* Play triangle icon */
.play-btn::before {
  content: '';
  display: block;
  width: 0; height: 0;
  border-style: solid;
  border-width: 24px 0 24px 42px;
  border-color: transparent transparent transparent #fff;
  margin-left: 6px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
}

@keyframes playPulse {
  0%   { box-shadow: 0 0 0 0 rgba(56,189,248,0.4), 0 8px 30px rgba(56,189,248,0.3), 0 4px 15px rgba(0,0,0,0.4); }
  50%  { box-shadow: 0 0 0 20px rgba(56,189,248,0), 0 8px 30px rgba(56,189,248,0.3), 0 4px 15px rgba(0,0,0,0.4); }
  100% { box-shadow: 0 0 0 0 rgba(56,189,248,0.4), 0 8px 30px rgba(56,189,248,0.3), 0 4px 15px rgba(0,0,0,0.4); }
}

.play-label {
  font-size: 1.2rem;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-shadow: 0 0 20px rgba(56,189,248,0.3);
}

/* Bottom nav */
.bottom-nav {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}
.nav-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 28px;
  text-decoration: none;
  color: inherit;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  min-width: 200px;
}
.nav-card:hover {
  transform: translateY(-3px);
  border-color: var(--purple);
  background: var(--surface2);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.nav-card .icon {
  font-size: 1.5rem;
  width: 40px; height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(167, 139, 250, 0.1);
  border-radius: 8px;
}
.nav-card .label {
  font-weight: 700;
  font-size: 0.95rem;
}
.nav-card .desc {
  font-size: 0.75rem;
  color: var(--muted);
}

/* Login Modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(12, 18, 32, 0.88);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; backdrop-filter: blur(8px);
}
.modal-content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 30px;
  width: 100%; max-width: 400px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  animation: popIn .35s ease;
}
@keyframes popIn {
  from { transform: scale(.85); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.modal-content h2 { color: var(--accent); margin-bottom: 20px; text-align: center; }
.form-group { margin-bottom: 15px; }
.form-group label { display: block; margin-bottom: 6px; color: var(--text); font-size: 0.9rem; }
.form-group select {
  width: 100%; padding: 12px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px;
  font-size: 1rem; outline: none; font-family: inherit;
}
.form-group select:focus { border-color: var(--purple); }
.form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
.btn-primary {
  background: linear-gradient(90deg, var(--accent), var(--purple));
  color: #fff; border: none; padding: 10px 20px;
  border-radius: 8px; font-weight: bold; cursor: pointer;
  transition: 0.2s; font-family: inherit;
}
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
.btn-primary:not(:disabled):hover { opacity: 0.9; transform: translateY(-1px); }
.btn-cancel {
  background: transparent; color: var(--text);
  border: 1px solid var(--border); padding: 10px 20px;
  border-radius: 8px; cursor: pointer; font-family: inherit;
}
.btn-cancel:hover { background: var(--surface2); }

/* User status strip */
.user-strip {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 12px;
}
.user-strip .name { color: var(--green); font-weight: 700; }

@media (max-width: 600px) {
  .play-btn { width: 110px; height: 110px; }
  .play-btn::before { border-width: 18px 0 18px 32px; margin-left: 5px; }
  .bottom-nav { flex-direction: column; align-items: center; }
  .nav-card { min-width: 260px; }
}
</style>
</head>
<body>

<!-- Particles -->
<div class="particles" id="particles"></div>

<!-- Top Bar -->
<div class="top-bar">
    <span id="user-status" class="user-strip"></span>
    <button id="btn-logout" class="btn-sm" style="display:none;">登出</button>
</div>

<!-- Login Modal -->
<div id="login-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <h2>🎓 登入訓練系統</h2>
        <div class="form-group">
            <label>班級</label>
            <select id="sel-class">
                <option value="">請選擇班級</option>
            </select>
        </div>
        <div class="form-group">
            <label>座號與姓名</label>
            <select id="sel-student" disabled>
                <option value="">請先選擇班級</option>
            </select>
        </div>
        <div class="form-group" style="margin-top:5px;">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.85rem;color:var(--muted);">
                <input type="checkbox" id="chk-persist" style="width:16px;height:16px;cursor:pointer;">
                保持登入（個人裝置適用，共用電腦請勿勾選）
            </label>
        </div>
        <div class="form-actions">
            <button id="btn-cancel-login" class="btn-cancel">取消</button>
            <button id="btn-do-login" class="btn-primary" disabled>確認登入</button>
        </div>
    </div>
</div>

<div class="container">
    <h1>軟體設計丙級檢定</h1>
    <p class="subtitle">VB.NET ── 術科互動練習系統 v1.0</p>

    <!-- Play Button Area -->
    <div class="play-area">
        <button class="play-btn" id="btn-play" title="開始練習"></button>
        <div class="play-label" id="play-label">開始練習</div>
        <div id="motivational-quote" style="margin-top: 15px; font-size: 0.95rem; color: rgba(255,255,255,0.9); font-style: italic; width: fit-content; max-width: 90vw; margin-left: auto; margin-right: auto; text-align: center; line-height: 1.5; padding: 12px 20px; background: rgba(255,255,255,0.06); border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); text-wrap: balance; word-break: keep-all;"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">

        <a href="leaderboard.html" class="nav-card">
            <div class="icon">🏆</div>
            <div>
                <div class="label">排行榜</div>
                <div class="desc">查看全班英雄榜</div>
            </div>
        </a>
    </div>
</div>

<script src="js/users.js"></script>
<script src="js/quotes.js"></script>
<script type="module" src="js/api.js?v=10"></script>
<script>
// ── Particles ──
(function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (6 + Math.random() * 10) + 's';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
        const colors = ['#38bdf8', '#a78bfa', '#4ade80', '#fbbf24'];
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        container.appendChild(p);
    }
})();

// ── Auth Logic ──
async function initAuthUI() {
    const user = typeof getCurrentUser === 'function' ? getCurrentUser() : null;
    const statusEl = document.getElementById('user-status');
    const btnLogout = document.getElementById('btn-logout');
    const playLabel = document.getElementById('play-label');

    if (user) {
        let starsStr = '';
        if (typeof window.getUserStarStats === 'function') {
            const stats = await window.getUserStarStats(user.name);
            starsStr = `(⭐ ${stats.currentStars} / ${stats.totalPossibleStars})`;
        }
        statusEl.innerHTML = `<span class="name">${user.className} ${user.name}</span> ${starsStr} 已登入`;
        btnLogout.style.display = 'inline-block';
        playLabel.textContent = '繼續練習';
        document.getElementById('login-modal').style.display = 'none';
        document.getElementById('btn-cancel-login').style.display = 'inline-block';
    } else {
        statusEl.innerHTML = '';
        btnLogout.style.display = 'none';
        playLabel.textContent = '開始練習';
        document.getElementById('btn-cancel-login').style.display = 'inline-block';
    }
}

function showLoginModal() {
    const loginModal = document.getElementById('login-modal');
    const classSelect = document.getElementById('sel-class');
    classSelect.innerHTML = '<option value="">請選擇班級</option>';
    if (typeof CLASS_ROSTER !== 'undefined') {
        Object.keys(CLASS_ROSTER).forEach(cls => {
            classSelect.innerHTML += `<option value="${cls}">${cls}</option>`;
        });
        // dev 模式下顯示測試帳號
        if (new URLSearchParams(window.location.search).get('dev') === '1') {
            classSelect.innerHTML += `<option value="__TEST__">🔧 測試用</option>`;
        }
    }
    document.getElementById('sel-student').innerHTML = '<option value="">請先選擇班級</option>';
    document.getElementById('sel-student').disabled = true;
    document.getElementById('btn-do-login').disabled = true;
    loginModal.style.display = 'flex';
}

document.addEventListener('DOMContentLoaded', () => {
    initAuthUI();

    // Play button: if not logged in → show login; else → go to easiest or next level
    document.getElementById('btn-play').addEventListener('click', async () => {
        const user = typeof getCurrentUser === 'function' ? getCurrentUser() : null;
        if (!user) {
            showLoginModal();
        } else {
            document.getElementById('btn-play').style.pointerEvents = 'none';
            document.getElementById('play-label').textContent = '讀取中...';
            await resumeGame(user.name);
        }
    });

    // Login modal interactions
    const loginModal = document.getElementById('login-modal');

    document.getElementById('btn-cancel-login').addEventListener('click', () => {
        loginModal.style.display = 'none';
    });

    document.getElementById('sel-class').addEventListener('change', (e) => {
        const cls = e.target.value;
        const studentSelect = document.getElementById('sel-student');
        const btnDoLogin = document.getElementById('btn-do-login');
        if (cls === '__TEST__') {
            studentSelect.disabled = false;
            studentSelect.innerHTML = '<option value="0|測試老師">0號 測試老師</option>';
            btnDoLogin.disabled = false;
        } else if (cls && typeof CLASS_ROSTER !== 'undefined') {
            studentSelect.disabled = false;
            studentSelect.innerHTML = '<option value="">請選擇座號與姓名</option>';
            CLASS_ROSTER[cls].forEach(student => {
                studentSelect.innerHTML += `<option value="${student.no}|${student.name}">${student.no}號 ${student.name}</option>`;
            });
        } else {
            studentSelect.disabled = true;
            studentSelect.innerHTML = '<option value="">請先選擇班級</option>';
            btnDoLogin.disabled = true;
        }
    });

    document.getElementById('sel-student').addEventListener('change', (e) => {
        document.getElementById('btn-do-login').disabled = !e.target.value;
    });

    document.getElementById('btn-do-login').addEventListener('click', async () => {
        const cls = document.getElementById('sel-class').value;
        const studentVal = document.getElementById('sel-student').value;
        if (cls && studentVal) {
            const [no, name] = studentVal.split('|');
            const persist = document.getElementById('chk-persist').checked;
            const displayClass = cls === '__TEST__' ? '測試用' : cls;
            loginUser(displayClass, parseInt(no), name, persist);
            initAuthUI();
            loginModal.style.display = 'none';
            const btnDoLogin = document.getElementById('btn-do-login');
            btnDoLogin.textContent = '讀取中...';
            btnDoLogin.disabled = true;
            await resumeGame(name);
        }
    });

    async function resumeGame(userName) {
        const LEVEL_SEQUENCE = [
            { q: 'SETUP', t: 'T01' }, { q: 'Q1', t: 'T01' }, { q: 'Q1', t: 'T02' }, { q: 'Q1', t: 'T03' },
            { q: 'Q2', t: 'T01' }, { q: 'Q2', t: 'T02' }, { q: 'Q2', t: 'T03' },
            { q: 'Q3', t: 'T01' }, { q: 'Q3', t: 'T02' }, { q: 'Q3', t: 'T03' },
            { q: 'Q4', t: 'T01' }, { q: 'Q4', t: 'T02' }, { q: 'Q4', t: 'T03' },
            { q: 'Q5', t: 'T01' }, { q: 'Q5', t: 'T02' }, { q: 'Q5', t: 'T03' },
            { q: '1060306', t: 'T01' }, { q: '1060307', t: 'T01' }, { q: '1060308', t: 'T01' }
        ];
        const MODE_TO_FILE = { '英中單字配對': '連連看', '圖卡翻牌記憶': '記憶翻牌遊戲', '全程式撰寫': '獨立全程式撰寫' };
        let mode = '連連看';
        let nextQ = 'SETUP';
        let nextT = 'T01';

        try {
            if (window.getScoresForUser) {
                const allScores = await window.getScoresForUser(userName);
                const passed = allScores.filter(s => s.status === 'PASS').sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                if (passed.length > 0) {
                    mode = passed[0].gameMode; // Use the most recently passed mode
                    const modePassed = passed.filter(s => s.gameMode === mode);
                    
                    let foundUnbeaten = false;
                    for (let i = 0; i < LEVEL_SEQUENCE.length; i++) {
                        const lvl = LEVEL_SEQUENCE[i];
                        const isBeaten = modePassed.some(r => r.qID === lvl.q + '_' + lvl.t || r.qID === lvl.q);
                        if (!isBeaten) {
                            nextQ = lvl.q;
                            nextT = lvl.t;
                            foundUnbeaten = true;
                            break;
                        }
                    }
                    if (!foundUnbeaten) {
                        // 打字子模式也要用正確的 mode 名稱跳到 map
                        window.location.href = `pages/map.html?mode=${encodeURIComponent(mode)}&tab=map`;
                        return;
                    }
                }
            }
        } catch(e) { console.error(e); }
        // 正規化模式名稱為檔名
        mode = MODE_TO_FILE[mode] || mode;
        // 打字子模式需要轉換為正確的檔名 + sub 參數
        const TYPING_SUB = { '打字-關鍵字': 'keyword', '打字-單行': 'line', '打字-完整': 'full' };
        if (TYPING_SUB[mode]) {
            window.location.href = `pages/打字練習.html?q=${nextQ}&t=${nextT}&sub=${TYPING_SUB[mode]}`;
        } else {
            window.location.href = `pages/${mode}.html?q=${nextQ}&t=${nextT}`;
        }
    }

    document.getElementById('btn-logout').addEventListener('click', () => {
        logoutUser();
        initAuthUI();
    });
});
</script>

</body>
</html>
