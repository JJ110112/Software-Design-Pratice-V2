<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>術科練習 ── 中英選擇題</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/common.css?v=5">
    <style>
        .game-section {
            padding: 0 12px 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0 20px;
            margin-bottom: 20px;
        }

        .section-label::before,
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .question-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 24px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .keyword-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            color: var(--accent);
            margin: 20px 0 30px;
            letter-spacing: 0.05em;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .quiz-progress {
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        @media (min-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .option-btn {
            background: #0d1117;
            border: 2px solid var(--border);
            color: var(--text);
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-align: left;
            display: flex;
            align-items: center;
        }

        .option-btn .opt-letter {
            background: rgba(255, 255, 255, 0.1);
            color: var(--muted);
            width: 28px;
            height: 28px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            margin-right: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .option-btn:hover:not(:disabled) {
            background: #161b22;
            border-color: var(--muted);
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background: rgba(74, 222, 128, 0.1);
            border-color: var(--green);
            color: var(--green);
        }

        .option-btn.correct .opt-letter {
            background: var(--green);
            color: #000;
        }

        .option-btn.wrong {
            background: rgba(248, 113, 113, 0.1);
            border-color: var(--red);
            color: var(--red);
            animation: shake 0.4s ease;
        }

        .option-btn.wrong .opt-letter {
            background: var(--red);
            color: #000;
        }

        .option-btn:disabled {
            cursor: default;
            opacity: 0.7;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-5px);
            }

            40%,
            80% {
                transform: translateX(5px);
            }
        }

        .feedback-area {
            margin-top: 24px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── PREVIEW PHASE BANNER ── */
        #preview-banner {
            background: rgba(251, 191, 36, .08);
            border: 1px solid rgba(251, 191, 36, .3);
            border-radius: 10px;
            padding: 16px 24px;
            text-align: center;
            margin-bottom: 20px;
            color: var(--gold);
            font-size: .88rem;
            line-height: 1.6;
        }

        #preview-banner strong {
            font-size: 1rem;
            display: block;
            margin-bottom: 4px;
        }

        #preview-banner.hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="page-header">
        <div class="badge-row">
            <span class="badge badge-blue">軟體設計丙級 · VB.NET</span>
            <span class="badge badge-gold" id="topic-badge">基礎語法</span>
        </div>
        <h1>中英選擇題<br><em>翻譯單一關鍵字</em></h1>
        <p class="subtitle">打好程式基礎！選出畫面上方英文指令所代表的正確中文涵義。</p>
    </div>

    <div class="game-section">
        <div class="game-header" style="justify-content: flex-start; margin-bottom: 12px;">
            <a href="#" class="back-btn" id="btn-back">← 返回</a>
            <div class="mode-pill lvl-easy">中英選擇題</div>
        </div>

        <div class="section-label">單字測驗區</div>

        <div id="preview-banner">
            <strong>💡 測驗說明</strong>
            這是一個針對 VB.NET 常見關鍵字與指令的測驗。請在四個選項中選出最符合的翻譯，答完十題即可完成一輪挑戰！
        </div>

        <div class="question-card" id="quiz-area" style="display:none;">
            <div class="quiz-progress" id="quiz-progress">Question 1 / 10</div>
            <div class="keyword-display" id="keyword-display">Dim</div>

            <div class="options-grid" id="options-grid">
                <!-- Options will be generated here -->
            </div>

            <div class="feedback-area">
                <button class="btn btn-ghost" id="btn-hint">💡 提示</button>
                <button class="btn btn-primary" id="btn-next" style="display:none;">下一題 ➔</button>
            </div>
        </div>

        <div class="btn-row" id="btn-start-zone">
            <button class="btn btn-gold" id="btn-start">▶ 開始測驗</button>
        </div>
    </div>

    <!-- overlay -->
    <div id="overlay">
        <div class="overlay-card">
            <div class="big-emoji" id="result-emoji">🏆</div>
            <h2 id="result-title">測驗完成！</h2>
            <p id="result-desc">你的基礎很紮實喔！</p>
            <div class="score-display" id="final-score">得分：100 分</div>
            <div style="display:flex; justify-content:center; gap:10px; margin-top:20px;">
                <button class="btn btn-primary" id="btn-again">再挑戰一次</button>
                <button class="btn btn-primary" id="btn-next-level" style="display:none;">⏭️ 下一關</button>
            </div>
        </div>
    </div>

    <script src="../js/users.js"></script>
    <script src="../js/quiz_data.js"></script>
    <script type="module" src="../js/api.js?v=10"></script>
    <script>
        // VB.NET Common Keywords Dictionary tailored for the exam
        const DICTIONARY = [
            { word: "Dim", desc: "宣告變數" },
            { word: "As", desc: "定義資料型別" },
            { word: "Integer", desc: "整數型別" },
            { word: "String", desc: "字串型別" },
            { word: "New", desc: "建立新物件" },
            { word: "StreamReader", desc: "讀取檔案串流物件" },
            { word: "ReadLine()", desc: "從檔案或串流中讀取一行文字" },
            { word: "For", desc: "計數迴圈的開始" },
            { word: "To", desc: "指定 For 迴圈的終止數值" },
            { word: "If", desc: "If 條件判斷式開頭" },
            { word: "Then", desc: "判斷式成立時則執行下方程式" },
            { word: "Next", desc: "For 迴圈的結尾，用來遞增計數器" },
            { word: "Exit For", desc: "強制跳出 For 迴圈" },
            { word: "Exit Do", desc: "強制跳出 Do 迴圈" },
            { word: "Do While", desc: "當條件為真時，繼續執行迴圈 (前測試)" },
            { word: "Do", desc: "迴圈開頭標記 (常與 Loop搭配)" },
            { word: "Loop", desc: "Do 迴圈的結尾標記" },
            { word: "Loop While", desc: "當條件為真時，繼續執行的迴圈結 (後測試)" },
            { word: "Length", desc: "取得字串的長度或陣列的大小" },
            { word: "Sub", desc: "宣告副程式" },
            { word: "End Sub", desc: "副程式結束" },
            { word: "vbCrLf", desc: "VB 專屬的換行字元 (Carriage Return + Line Feed)" },
            { word: "RichTextBox", desc: "能夠顯示與編輯多格式文字的文字方塊控制項" },
            { word: "AppendText()", desc: "將文字附加到現有文字的最後面" },
            { word: "StreamWriter", desc: "用以將字元寫入串流中" },
            { word: "Mid()", desc: "從字串中間擷取指定長度的子字串" },
            { word: "Split()", desc: "使用指定的分隔符號將字串切割成陣列" },
            { word: "FileOpen()", desc: "開啟指定路徑的檔案供讀寫" },
            { word: "PrintLine()", desc: "將一行包含換行符號的文字寫入檔案" },
            { word: "EOF()", desc: "判斷是否已經讀取到檔案的結尾 (End Of File)" },
            // --- 新增的進階/特定關卡關鍵字 ---
            { word: "Math.Abs()", desc: "取得數值的絕對值" },
            { word: "Val()", desc: "將字串轉換成對應的數值" },
            { word: "DataTable", desc: "資料表物件" },
            { word: "NewRow", desc: "建立資料表的一筆新紀錄 (Row)" },
            { word: "DataRow", desc: "資料列型別" },
            { word: "Columns.Add()", desc: "在資料表的欄位集合中新增一個欄位" },
            { word: "Rows.Add()", desc: "將一筆資料列加入至資料表的列集合" },
            { word: "Mod", desc: "取餘數" },
            { word: "\\", desc: "整數除法運算子，會無條件捨去小數點" },
            { word: "Encoding.UTF8.GetString()", desc: "將 UTF-8 編碼的位元組陣列轉換為字串" },
            { word: "Int()", desc: "將數字無條件捨去至最接近的整數" },
            { word: "List(Of String())", desc: "宣告一個儲存字串陣列的動態串列" },
            { word: "InStr()", desc: "傳回某字串在另一個字串中第一次出現的起始位置" },
            { word: "Sort()", desc: "對資料進行排序" },
            { word: "DataSource", desc: "設定或取得控制項的資料來源" },
            { word: "Align", desc: "設定對齊方式" },
            { word: "DataGridView", desc: "格線顯示資料表物件" }
        ];

        const urlParams = new URLSearchParams(window.location.search);
        const qID = urlParams.get('q') || 'Q1';
        const tID = urlParams.get('t') || 'T01';

        document.getElementById('btn-back').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = `../index.html?q=${qID}&t=${tID}`;
        });

        let questions = [];
        let currentQuestionIndex = 0;
        let correctCount = 0;
        let options = [];
        let totalHintsUsed = 0;

        let startTime = 0;
        let seconds = 0;

        // Sound effects
        const AC = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function getAC() { if (!audioCtx) audioCtx = new AC(); return audioCtx; }

        function playCorrect() {
            try {
                const ctx = getAC();
                [[523.25, 0], [783.99, 0.1]].forEach(([freq, when]) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    const t = ctx.currentTime + when;
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.2, t + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                    osc.start(t); osc.stop(t + 0.31);
                });
            } catch (e) { }
        }

        function playWrong() {
            try {
                const ctx = getAC();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sawtooth';
                osc.frequency.value = 150;
                const t = ctx.currentTime;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.2, t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                osc.start(t); osc.stop(t + 0.31);
            } catch (e) { }
        }

        // Helpers
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            window.scrollTo(0, 0);
            document.getElementById('preview-banner').style.display = 'none';
            document.getElementById('btn-start-zone').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            startTime = Date.now();

            // Select 10 random questions
            startQuiz();
        });

        document.getElementById('btn-again').addEventListener('click', () => {
            document.getElementById('overlay').classList.remove('show');
            startQuiz();
        });

        let currentQuizQuestionsTotal = 10;
        let TOTAL_QUESTIONS = 10;
        function startQuiz() {
            correctCount = 0;
            currentQuestionIndex = 0;
            totalHintsUsed = 0;

            let pool = [...DICTIONARY];

            // Try to prioritize words that appear in the current level's code
            if (typeof generateSteps === 'function') {
                const steps = generateSteps(qID, tID);
                const codeText = steps.map(s => s.code).join('\n');

                let levelWords = pool.filter(item => {
                    let searchWord = item.word;
                    if (searchWord.endsWith('()')) {
                        searchWord = searchWord.slice(0, -2);
                    }
                    if (searchWord === '\\') searchWord = '\\\\';
                    if (item.word === '\\') return codeText.includes('\\');
                    try {
                        const regex = new RegExp('\\b' + searchWord + '\\b', 'i');
                        return regex.test(codeText);
                    } catch (e) {
                        return codeText.includes(searchWord);
                    }
                });

                let seenWords = JSON.parse(sessionStorage.getItem('seenDictWords') || '[]');

                if (levelWords.length > 0) {
                    // Priority 1: Unseen words in this level's code
                    let unseenLevel = levelWords.filter(w => !seenWords.includes(w.word));
                    // Priority 2: Seen words in this level's code
                    let seenLevel = levelWords.filter(w => seenWords.includes(w.word));

                    unseenLevel = shuffle(unseenLevel);
                    seenLevel = shuffle(seenLevel);

                    // 1060306 ~ 1060308 程式碼較長且各不相同，允許出到 10 題
                    let maxQuestions = 5;
                    if (qID === '1060306' || qID === '1060307' || qID === '1060308') {
                        maxQuestions = 10;
                    }

                    // Limit the questions to max 5 (or 10) to reduce repetition on similar stages
                    currentQuizQuestionsTotal = Math.min(maxQuestions, Math.max(3, levelWords.length));
                    TOTAL_QUESTIONS = currentQuizQuestionsTotal;

                    pool = unseenLevel.concat(seenLevel);
                } else {
                    pool = shuffle(pool);
                    TOTAL_QUESTIONS = 5;
                    currentQuizQuestionsTotal = 5;
                }
            } else {
                pool = shuffle(pool);
                TOTAL_QUESTIONS = 5;
            }

            questions = pool.slice(0, TOTAL_QUESTIONS);

            // Mark these as seen for the next game
            let seenWordsUpdate = JSON.parse(sessionStorage.getItem('seenDictWords') || '[]');
            questions.forEach(q => {
                if (!seenWordsUpdate.includes(q.word)) seenWordsUpdate.push(q.word);
            });
            sessionStorage.setItem('seenDictWords', JSON.stringify(seenWordsUpdate));

            loadQuestion();
        }

        function loadQuestion() {
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('btn-hint').style.display = 'inline-flex';
            document.getElementById('btn-hint').disabled = false;
            const qData = questions[currentQuestionIndex];

            document.getElementById('quiz-progress').textContent = `Question ${currentQuestionIndex + 1} / ${TOTAL_QUESTIONS}`;
            document.getElementById('keyword-display').textContent = qData.word;

            // Generate options: 1 correct + 3 randomly picked wrong answers
            let choices = [qData];
            let pool = DICTIONARY.filter(item => item.word !== qData.word);
            pool = shuffle(pool);
            choices = choices.concat(pool.slice(0, 3));
            choices = shuffle(choices);

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';

            const letters = ['A', 'B', 'C', 'D'];

            choices.forEach((choice, idx) => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="opt-letter">${letters[idx]}</span> <span class="opt-text">${choice.desc}</span>`;

                btn.onclick = () => handleAnswer(btn, choice.word === qData.word, choices);
                grid.appendChild(btn);
            });
        }

        function handleAnswer(btn, isCorrect, allChoices) {
            // Disable all options
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);
            document.getElementById('btn-hint').style.display = 'none';

            if (isCorrect) {
                btn.classList.add('correct');
                playCorrect();
                correctCount++;
            } else {
                btn.classList.add('wrong');
                playWrong();
                // highlight correct answer
                const qData = questions[currentQuestionIndex];
                allBtns.forEach(b => {
                    if (b.innerText.includes(qData.desc)) {
                        b.classList.add('correct');
                    }
                });
            }

            document.getElementById('btn-next').style.display = 'inline-flex';
        }

        document.getElementById('btn-next').addEventListener('click', () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < TOTAL_QUESTIONS) {
                loadQuestion();
            } else {
                showResult();
            }
        });

        document.getElementById('btn-hint').addEventListener('click', () => {
            const qData = questions[currentQuestionIndex];
            const allBtns = document.querySelectorAll('.option-btn');
            // Find wrong options that are still enabled and not yet eliminated
            const wrongBtns = Array.from(allBtns).filter(b =>
                !b.disabled && !b.querySelector('.opt-text').textContent.includes(qData.desc)
            );
            if (wrongBtns.length > 0) {
                const target = wrongBtns[Math.floor(Math.random() * wrongBtns.length)];
                target.disabled = true;
                target.style.opacity = '0.3';
                totalHintsUsed++;
            }
            // Disable hint button after use for this question
            document.getElementById('btn-hint').disabled = true;
        });

        function showResult() {
            const score = Math.round((correctCount / TOTAL_QUESTIONS) * 100);
            document.getElementById('final-score').textContent = `得分：${score} 分`;

            const emoji = document.getElementById('result-emoji');
            const title = document.getElementById('result-title');
            const desc = document.getElementById('result-desc');

            if (score === 100) {
                emoji.textContent = "🏅";
                title.textContent = "完美過關！";
                desc.textContent = "所有的關鍵字你都倒背如流了，第一階段封頂啦！";
            } else if (score >= 80) {
                emoji.textContent = "🎓";
                title.textContent = "表現優異！";
                desc.textContent = "大部分的指令你都搞懂了，繼續保持！";
            } else if (score >= 60) {
                emoji.textContent = "👍";
                title.textContent = "及格邊緣！";
                desc.textContent = "還算不錯，但有些單字可能還要再多看幾眼喔！";
            } else {
                emoji.textContent = "💪";
                title.textContent = "再接再厲！";
                desc.textContent = "萬事起頭難，只要多練習幾次，你一定能記起來的！";
            }

            seconds = Math.round((Date.now() - startTime) / 1000);
            document.getElementById('overlay').classList.add('show');

            // 將成績送往雲端 (若已登入且及格)
            if (typeof getCurrentUser === 'function') {
                const user = getCurrentUser();
                if (user && score >= 60 && typeof window.saveScore === 'function') {

                    let stars = 3;
                    if (typeof totalHintsUsed !== 'undefined') {
                        if (totalHintsUsed > 0 && totalHintsUsed <= 3) stars = 2;
                        if (totalHintsUsed > 3) stars = 1;
                    }
                    let finalScoreSpan = document.getElementById('final-score');
                    if (finalScoreSpan) {
                        finalScoreSpan.style.width = "calc(100% + 40px)";
                        finalScoreSpan.style.marginLeft = "-20px";
                        finalScoreSpan.style.padding = "20px 10px 25px 10px";
                        finalScoreSpan.style.boxSizing = "border-box";
                        const hintsCount = typeof totalHintsUsed !== 'undefined' ? totalHintsUsed : 0;
                        let originHtml = finalScoreSpan.innerHTML;

                        // 移除舊版的星星 UI
                        originHtml = originHtml.replace(/<div class="star-display-container"([\s\S]*?)<\/div>\s*<\/div>/g, '');
                        originHtml = originHtml.replace(/<br>⭐ 提示.*顆/g, '');

                        // 修正折行問題，將各個統計項目包裝在 nowrap 中
                        originHtml = originHtml.replace(/(⏱ 用時.*?秒)/g, '<span style="white-space:nowrap;">$1</span>');
                        originHtml = originHtml.replace(/(❌ 錯誤.*?次)/g, '<span style="white-space:nowrap;">$1</span>');
                        originHtml = originHtml.replace(/(🎯 正確率.*?%)/g, '<span style="white-space:nowrap;">$1</span>');
                        originHtml = originHtml.replace(/　　/g, ' &nbsp;&nbsp; ');

                        finalScoreSpan.innerHTML = originHtml + `
                  <div class="star-display-container" style="margin-top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center;">
                      <div style="display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 5px; flex-wrap: nowrap;">
                          ${Array(3).fill(0).map((_, i) => `<span style="font-size: 2.5rem; filter: ${i < stars ? 'drop-shadow(0 0 12px rgba(251,191,36,0.8))' : 'grayscale(100%) opacity(20%)'}; transform: scale(${i < stars ? 1.1 : 1}); transition: all 0.3s ease; line-height: 1;">⭐</span>`).join('')}
                      </div>
                      <div style="font-size: 0.85rem; color: #94a3b8; text-align: center; margin-top: 10px;">
                          ( 使用提示：${hintsCount} 次 )
                      </div>
                  </div>
              `;
                    }
                    window.saveScore(user.className, user.name, qID + '_' + tID, "中英選擇題", seconds, "PASS", stars)
                        .then(res => console.log("選擇題成績上傳完成:", res));
                }
            }

            setupNextLevelButton();
        }

        function setupNextLevelButton() {
            const LEVEL_SEQUENCE = [
                { q: 'SETUP', t: 'T01' }, { q: 'Q1', t: 'T01' }, { q: 'Q1', t: 'T02' }, { q: 'Q1', t: 'T03' },
                { q: 'Q2', t: 'T01' }, { q: 'Q2', t: 'T02' }, { q: 'Q2', t: 'T03' }, { q: 'Q3', t: 'T01' },
                { q: 'Q3', t: 'T02' }, { q: 'Q3', t: 'T03' }, { q: 'Q4', t: 'T01' }, { q: 'Q4', t: 'T02' },
                { q: 'Q4', t: 'T03' }, { q: 'Q5', t: 'T01' }, { q: 'Q5', t: 'T02' }, { q: 'Q5', t: 'T03' },
                { q: '1060306', t: 'T01' }, { q: '1060307', t: 'T01' }, { q: '1060308', t: 'T01' }
            ];
            let currentIndex = LEVEL_SEQUENCE.findIndex(l => l.q === qID && l.t === tID);
            const nextBtn = document.getElementById('btn-next-level');
            if (currentIndex >= 0 && currentIndex < LEVEL_SEQUENCE.length - 1) {
                const nextLv = LEVEL_SEQUENCE[currentIndex + 1];
                nextBtn.style.display = 'block';
                nextBtn.innerHTML = '⏭️ 下一關';
                nextBtn.onclick = () => {
                    window.location.href = `中英選擇題.html?q=${nextLv.q}&t=${nextLv.t}`;
                };
            } else if (currentIndex === LEVEL_SEQUENCE.length - 1) {
                // Last level completed, jump to the next phase
                nextBtn.style.display = 'block';
                nextBtn.innerHTML = '🎉 進入第二階段 (朗讀練習)';
                nextBtn.onclick = () => {
                    window.location.href = '程式碼朗讀練習.html?q=SETUP&t=T01';
                };
            } else {
                nextBtn.style.display = 'none';
                nextBtn.onclick = null;
            }
        }
    </script>
    <script src="../js/game-toolbar.js"></script>
    <script src="../js/nextlevel.js"></script>
</body>
