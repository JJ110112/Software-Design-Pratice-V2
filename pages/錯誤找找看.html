<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="../favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>術科練習 ── 錯誤找找看</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0b0f1a;
  --bg2:       #111827;
  --surface:   #1a2035;
  --border:    #2a3550;
  --accent:    #38bdf8;
  --gold:      #fbbf24;
  --green:     #4ade80;
  --red:       #f87171;
  --purple:    #c084fc;
  --text:      #e2e8f0;
  --muted:     #64748b;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══ grid bg ═══ */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(56,189,248,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;
}

/* ═══ HEADER ═══ */
.page-header {
  text-align: center;
  padding: 32px 20px 20px;
  position: relative;
}
.badge-row { display:flex; gap:8px; justify-content:center; margin-bottom:10px; flex-wrap:wrap; }
.badge {
  font-size:.68rem; font-weight:900; letter-spacing:.1em; text-transform:uppercase;
  padding:3px 12px; border-radius:2px;
}
.badge-blue  { background:rgba(56,189,248,.15); color:var(--accent); border:1px solid rgba(56,189,248,.3); }
.badge-gold  { background:rgba(251,191,36,.12);  color:var(--gold);   border:1px solid rgba(251,191,36,.3); }
.badge-red   { background:rgba(248,113,113,.12); color:var(--red);    border:1px solid rgba(248,113,113,.3); }

/* GAME HEADER */
.game-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; justify-content: center; }
.back-btn { background: transparent; border: 1px solid var(--border); color: var(--muted2, #94a3b8); border-radius: 6px; padding: 6px 14px; font-size: .82rem; cursor: pointer; text-decoration: none; font-family: inherit; transition: all .2s; }
.back-btn:hover { color: var(--text); border-color: var(--muted2, #94a3b8); }
.mode-pill { font-size: .72rem; font-weight: 900; padding: 4px 12px; border-radius: 4px; text-transform: uppercase; letter-spacing: .08em; background: rgba(248, 113, 113, .15); color: var(--red); border: 1px solid rgba(248, 113, 113, .3); }

h1 {
  font-size: clamp(1.5rem, 5vw, 2.4rem);
  font-weight: 900;
  letter-spacing: -.02em;
  line-height: 1.15;
}
h1 em { color:var(--red); font-style:normal; }
.subtitle { color:var(--muted); font-size:.88rem; margin-top:8px; }

/* ═══ GAME SECTION ═══ */
.game-section { padding: 0 12px 60px; max-width: 860px; margin: 0 auto; }

#code-zh-hint {
  color: #cbd5e1;
  margin-bottom: 12px;
  font-size: 1.05rem;
  font-weight: 500;
  letter-spacing: 0.5px;
}

.section-label {
  display: flex; align-items: center; gap: 10px;
  font-size: .75rem; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--muted);
  padding: 0 20px; margin-bottom: 16px;
}
.section-label::before, .section-label::after {
  content:''; flex:1; height:1px; background:var(--border);
}

/* stats */
.stats-bar {
  display: flex; gap: 12px; flex-wrap: wrap;
  justify-content: center; margin-bottom: 20px;
}
.stat-chip {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 18px; text-align: center;
  min-width: 80px;
}
.stat-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.3rem; font-weight: 700; color: var(--accent);
  display: block;
}
.stat-lbl { font-size: .65rem; color: var(--muted); margin-top: 1px; display:block; }

/* ── Question Card ── */
.question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
  position: relative;
}
.q-num-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px;
}
.q-num {
  background: rgba(56,189,248,.12);
  color: var(--accent);
  border: 1px solid rgba(56,189,248,.3);
  border-radius: 50%;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 900; font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0;
}
.q-label { font-size:.82rem; color:var(--muted); }
.q-progress-bar {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.q-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--purple));
  border-radius: 2px;
  transition: width .4s ease;
}

/* ── Code Line Display ── */
.code-line-wrap {
  margin-bottom: 16px;
}
.code-context {
  font-size: .7rem; color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 8px; letter-spacing: .04em;
}
.code-display {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(.82rem, 2.5vw, 1rem);
  line-height: 2;
  overflow-x: auto;
  white-space: nowrap;
  position: relative;
}
.token {
  display: inline;
  padding: 2px 4px;
  border-radius: 4px;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: background .15s, border-color .15s, transform .1s;
  user-select: none;
  white-space: pre;
}
.token:hover:not(.token-locked) {
  background: rgba(56,189,248,.12);
  border-color: rgba(56,189,248,.4);
  transform: translateY(-1px);
}
.token.token-correct {
  background: rgba(74,222,128,.18);
  border-color: var(--green);
  animation: correctPop .5s ease;
}
.token.token-wrong {
  background: rgba(248,113,113,.15);
  border-color: var(--red);
  animation: wrongShake .4s ease;
}
.token.token-locked { cursor: default; }
@keyframes correctPop {
  0%   { transform:scale(1); }
  40%  { transform:scale(1.15); }
  100% { transform:scale(1); }
}
@keyframes wrongShake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)}
  60%{transform:translateX(5px)} 80%{transform:translateX(-2px)}
}

/* ── Hint / Instruction ── */
.instr {
  text-align:center; font-size:.82rem; color:var(--muted);
  margin-bottom:20px; line-height:1.6;
}
.instr strong { color:var(--accent); }

/* ── Result Banner ── */
.result-banner {
  border-radius: 8px;
  padding: 14px 18px;
  margin-top: 14px;
  font-size: .88rem;
  line-height: 1.7;
  display: none;
}
.result-banner.show { display: block; }
.result-banner.correct {
  background: rgba(74,222,128,.08);
  border: 1px solid rgba(74,222,128,.3);
  color: var(--green);
}
.result-banner.wrong-result {
  background: rgba(248,113,113,.06);
  border: 1px solid rgba(248,113,113,.3);
  color: var(--red);
}
.result-banner .explain {
  margin-top: 8px;
  color: var(--text);
  font-size: .82rem;
  line-height: 1.8;
}
.result-banner .correct-code {
  font-family: 'JetBrains Mono', monospace;
  background: rgba(74,222,128,.12);
  color: var(--green);
  padding: 8px 12px;
  border-radius: 6px;
  margin-top: 8px;
  font-size: .82rem;
  display: block;
}

/* ── Nav Buttons ── */
.btn-row { display:flex; gap:12px; justify-content:center; margin-top:22px; flex-wrap:wrap; }
.btn {
  font-family:'Noto Sans TC',sans-serif; font-weight:700; font-size:.88rem;
  padding:10px 28px; border-radius:6px; border:none; cursor:pointer;
  transition:all .2s;
}
.btn-primary { background:var(--accent); color:#000; }
.btn-primary:hover { background:#7dd3fc; transform:translateY(-2px); }
.btn-ghost {
  background:transparent; color:var(--muted);
  border:1px solid var(--border);
}
.btn-ghost:hover { color:var(--text); border-color:var(--muted); }
.btn-gold { background:var(--gold); color:#000; }
.btn-gold:hover { background:#fcd34d; transform:translateY(-2px); }
.btn-red { background:var(--red); color:#000; }
.btn-red:hover { background:#fca5a5; transform:translateY(-2px); }

/* ═══ COMPLETE OVERLAY ═══ */
#overlay {
  display:none; position:fixed; inset:0;
  background:rgba(11,15,26,.88); backdrop-filter:blur(6px);
  z-index:100; align-items:center; justify-content:center;
}
#overlay.show { display:flex; }
.overlay-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:44px 52px; text-align:center;
  max-width:420px; width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  animation:popIn .4s cubic-bezier(.4,0,.2,1);
}
@keyframes popIn {
  from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1}
}
.overlay-card .big-emoji { font-size:3.2rem; margin-bottom:12px; }
.overlay-card h2 { font-size:1.7rem; font-weight:900; margin-bottom:8px; }
.overlay-card p  { color:var(--muted); margin-bottom:6px; font-size:.9rem; }
.score-display {
  font-family:'JetBrains Mono',monospace; color:var(--green);
  font-size:1rem; margin:16px 0 24px;
  background:rgba(74,222,128,.08); border:1px solid rgba(74,222,128,.2);
  border-radius:6px; padding:12px;
}

/* answered indicator */
.token-answered-wrong-mark {
  display: inline-block;
  font-size: .6rem;
  color: var(--red);
  vertical-align: super;
  margin-left: 1px;
}
</style>

<!-- ═══ HEADER ═══ -->
<div class="page-header">
  <div class="badge-row">

<!-- ═══ GAME SECTION ═══ -->
<div class="game-section">
  <div class="game-header" style="justify-content: flex-start; margin-bottom: 12px;">
    <a href="#" class="back-btn" id="btn-back">← 返回</a>
    <div class="mode-pill lvl-easy" id="mode-pill">錯誤找找看</div>

  <!-- stats -->

    <div class="stat-chip"><span class="stat-val" id="stat-total">0</span><span class="stat-lbl">總題數</span></div>

    <div class="stat-chip"><span class="stat-val" id="stat-wrong">0</span><span class="stat-lbl">答錯</span></div>

      <div class="q-progress-bar">
        <div class="q-progress-fill" id="q-progress" style="width:0%"></div>
      </div>
    </div>

    <!-- Context line numbers -->
    <div class="code-line-wrap">
      <div class="code-context" id="code-context">第 ? 行（Q1 迴文判斷程式）</div>
      <div id="code-zh-hint"></div>
      <div class="code-display" id="code-display">
        <!-- tokens injected by JS -->
      </div>
    </div>

    <!-- result banner -->
    <div class="result-banner" id="result-banner">
      <div id="result-msg"></div>
      <div class="explain" id="result-explain"></div>

</div>

<!-- complete overlay -->
<div id="overlay">
  <div class="overlay-card">
    <div class="big-emoji" id="overlay-emoji">🎉</div>
    <h2 id="overlay-title">全部完成！</h2>
    <p id="overlay-subtitle">你已完整練習此題的常見錯誤！</p>

    <div style="display:flex; justify-content:center; gap:10px; margin-top:20px;">
        <button class="btn btn-primary" id="btn-again">再挑戰一次</button>
        <button class="btn btn-primary" id="btn-next-level" style="display:none;">⏭️ 下一關</button>
    </div>
  </div>
</div>

<script type="module" src="../js/api.js?v=10"></script>
<script src="../js/quiz_data.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const qID = urlParams.get('q') || 'Q1';
const tID = urlParams.get('t') || 'T01';

// 設定 UI
window.addEventListener('load', () => {
    if (QUIZ_DATA[qID]) {
        let labelText = `${qID} ${QUIZ_DATA[qID].title} (${tID})`;
        document.querySelector('h1').innerHTML = `${qID} ${QUIZ_DATA[qID].title}<br><em>錯誤找找看 (${tID})</em>`;
        document.getElementById('mode-pill').textContent = labelText;
        if(document.getElementById('topic-badge')) document.getElementById('topic-badge').textContent = `${qID} · ${QUIZ_DATA[qID].title}`;
        document.getElementById('overlay-subtitle').textContent = `你已完整練習 ${qID} ${QUIZ_DATA[qID].title} 的常見錯誤！`;
        
        let specificTests = QUIZ_DATA[qID].variant_bug_tests ? QUIZ_DATA[qID].variant_bug_tests[tID] : null;
        if (specificTests) {
            QUESTIONS = specificTests;
        } else {
            QUESTIONS = QUIZ_DATA[qID].bug_tests || [];
        }
        if(QUESTIONS.length === 0) {
            document.querySelector('.stats-bar').style.display = 'none';
            document.querySelector('.instr').innerHTML = `<strong>⚠️ 題庫建置中</strong><br>目前尚無 ${qID} 的除錯測資！`;
            document.getElementById('question-card').style.display = 'none';
            document.getElementById('btn-row-nav').style.display = 'none';
            document.getElementById('btn-row-hint').style.display = 'none';
        } else {
            document.getElementById('stat-total').textContent = QUESTIONS.length;
            startTimer();
            renderQuestion();
        }
    }
});

// BACK
document.getElementById('btn-back').addEventListener('click', (e) => {
    e.preventDefault();
    window.location.href = `../index.html?q=${qID}&t=${tID}`;
});

let QUESTIONS = [];
// ══════════ state ══════════
let currentQ    = 0;
let correctCount = 0;
let wrongCount   = 0;
let answered    = false;
let hintUsed = false;
let totalHintsUsed = 0;
let seconds     = 0;
let timerID     = null;

// ══════════ SOUND ══════════
const AC = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAC() {
  if (!audioCtx) audioCtx = new AC();
  return audioCtx;
}

function playCorrect() {
  try {
    const ctx = getAC();
    [[523.25, 0], [783.99, 0.13]].forEach(([freq, when]) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      const t = ctx.currentTime + when;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.28, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
      osc.start(t); osc.stop(t + 0.33);
    });
  } catch(e) {}
}

function playWrong() {
  try {
    const ctx = getAC();
    [[220, 0], [180, 0.1]].forEach(([freq, when]) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sawtooth'; osc.frequency.value = freq;
      const t = ctx.currentTime + when;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.18, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      osc.start(t); osc.stop(t + 0.23);
    });
  } catch(e) {}
}

function playWin() {
  try {
    const ctx = getAC();
    [[523.25,0],[659.25,0.15],[783.99,0.30],[1046.50,0.45]].forEach(([freq, when]) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      const t = ctx.currentTime + when;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.30, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      osc.start(t); osc.stop(t + 0.46);
    });
    const shimmer = ctx.createOscillator();
    const sGain   = ctx.createGain();
    shimmer.connect(sGain); sGain.connect(ctx.destination);
    shimmer.type = 'sine'; shimmer.frequency.value = 2093;
    const st = ctx.currentTime + 0.70;
    sGain.gain.setValueAtTime(0, st);
    sGain.gain.linearRampToValueAtTime(0.15, st + 0.02);
    sGain.gain.exponentialRampToValueAtTime(0.001, st + 0.6);
    shimmer.start(st); shimmer.stop(st + 0.61);
  } catch(e) {}
}

// ══════════ UI helpers ══════════
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateStats() {
  document.getElementById('stat-current').textContent = currentQ + 1;
  document.getElementById('stat-total').textContent   = QUESTIONS.length;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent   = wrongCount;
}

function updateProgress() {
  const pct = ((currentQ) / QUESTIONS.length) * 100;
  document.getElementById('q-progress').style.width = pct + '%';
  document.getElementById('q-num').textContent       = currentQ + 1;
  document.getElementById('q-label').textContent     = `第 ${currentQ + 1} 題，共 ${QUESTIONS.length} 題`;
}

// ══════════ Render question ══════════
function renderQuestion() {
  answered = false;
  hintUsed = false;

  const q = QUESTIONS[currentQ];
  updateProgress();
  updateStats();

  document.getElementById('code-context').textContent = q.lineNum + `（${qID} 程式）`;

  // Auto-find Chinese translation from generateSteps
  const steps = typeof generateSteps === 'function' ? generateSteps(qID, tID) : [];
  let matchLine = steps.find(s => s.code.trim() === q.correct.trim() || s.hint.trim() === q.correct.trim());
  if (!matchLine) {
      matchLine = steps.find(s => s.code.includes(q.correct) || s.hint.includes(q.correct));
  }
  const zhDesc = matchLine ? matchLine.zh : "（請從程式碼上下文判斷此行邏輯）";
  const hintEl = document.getElementById('code-zh-hint');
  if (hintEl) {
      hintEl.textContent = zhDesc;
  }

  // Build token elements
  const display = document.getElementById('code-display');
  display.innerHTML = '';
  q.tokens.forEach((tok, idx) => {
    const span = document.createElement('span');
    span.className = 'token';
    span.dataset.idx = idx;
    span.textContent = tok;
    span.addEventListener('click', () => onTokenClick(idx));
    display.appendChild(span);
  });

  // Hide result banner & nav
  const banner = document.getElementById('result-banner');
  banner.className = 'result-banner';
  document.getElementById('btn-row-nav').style.display = 'none';
  document.getElementById('btn-row-hint').style.display = 'flex';
}

// ══════════ Token click ══════════
function onTokenClick(clickedIdx) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[currentQ];
  const isCorrect = clickedIdx === q.errorIndex;

  // Mark tokens
  const tokens = document.querySelectorAll('.token');
  tokens.forEach(t => {
    const i = parseInt(t.dataset.idx);
    if (i === q.errorIndex) {
      t.classList.add('token-correct');
    }
    if (i === clickedIdx && !isCorrect) {
      t.classList.add('token-wrong');
    }
    t.classList.add('token-locked');
  });

  // Result banner
  const banner     = document.getElementById('result-banner');
  const msg        = document.getElementById('result-msg');
  const explain    = document.getElementById('result-explain');
  const correctEl  = document.getElementById('correct-code-display');

  if (isCorrect) {
    correctCount++;
    playCorrect();
    banner.className = 'result-banner correct show';
    msg.textContent  = '✅ 答對了！你找到了錯誤所在。';
  } else {
    wrongCount++;
    playWrong();
    banner.className = 'result-banner wrong-result show';
    msg.textContent  = '❌ 答錯了！正確錯誤位置已標示為綠色。';
  }

  explain.textContent = q.explain;
  correctEl.textContent = '✓ 正確寫法：' + q.correct;
  correctEl.style.display = 'block';

  document.getElementById('btn-row-nav').style.display = 'flex';
  document.getElementById('btn-row-hint').style.display = 'none';

  updateStats();

  if (currentQ + 1 === QUESTIONS.length) {
    document.getElementById('btn-next').textContent = '查看結果 🏁';
  }
}

// ══════════ Hint ══════════
document.getElementById('btn-hint').addEventListener('click', () => {
  if (answered || hintUsed) return;
  hintUsed = true;
  if (typeof totalHintsUsed !== "undefined") totalHintsUsed++;
  const q = QUESTIONS[currentQ];

  const banner  = document.getElementById('result-banner');
  const msg     = document.getElementById('result-msg');
  const explain = document.getElementById('result-explain');
  const correctEl = document.getElementById('correct-code-display');
  correctEl.style.display = 'none';

  banner.className  = 'result-banner show';
  banner.style.background = 'rgba(251,191,36,.07)';
  banner.style.borderColor = 'rgba(251,191,36,.35)';
  banner.style.color = 'var(--gold)';
  msg.textContent   = '💡 提示：' + q.hint;
  explain.textContent = '';

  // dim all tokens a bit except keep hover
  document.querySelectorAll('.token').forEach(t => {
    t.style.opacity = '0.75';
  });
});

// ══════════ Next question ══════════
document.getElementById('btn-next').addEventListener('click', () => {
  currentQ++;
  if (currentQ >= QUESTIONS.length) {
    showWin();
    return;
  }
  renderQuestion();
});

// ══════════ Win ══════════
function showWin() {
  clearInterval(timerID);
  playWin();
  const pct = Math.round(correctCount / QUESTIONS.length * 100);
  let emoji  = pct >= 80 ? '🏆' : pct >= 50 ? '🎯' : '💪';
  document.getElementById('overlay-emoji').textContent  = emoji;
  document.getElementById('overlay-title').textContent  = '完成所有題目！';
  document.getElementById('overlay-subtitle').textContent =
    `答對 ${correctCount} / ${QUESTIONS.length} 題，正確率 ${pct}%`;
  document.getElementById('final-score').innerHTML =
    `⏱ 用時 ${seconds} 秒　　❌ 錯誤 ${wrongCount} 次<br>🎯 正確率 ${pct}%`;
  document.getElementById('overlay').classList.add('show');

  // 將成績送往雲端 (若以登入且及格)
  if (typeof getCurrentUser === 'function') {
      const user = getCurrentUser();
      if (user && pct >= 60 && typeof window.saveScore === 'function') {
          // 在此處可選擇性顯示「成績上傳中」UI
          
          let stars = 3;
          if (typeof totalHintsUsed !== 'undefined') {
              if (totalHintsUsed > 0 && totalHintsUsed <= 3) stars = 2;
              if (totalHintsUsed > 3) stars = 1;
          }
          let finalScoreSpan = document.getElementById('final-score');
          if (finalScoreSpan) {
              finalScoreSpan.style.width = "calc(100% + 40px)";
              finalScoreSpan.style.marginLeft = "-20px";
              finalScoreSpan.style.padding = "20px 10px 25px 10px";
              finalScoreSpan.style.boxSizing = "border-box";
              const hintsCount = typeof totalHintsUsed !== 'undefined' ? totalHintsUsed : 0;
              let originHtml = finalScoreSpan.innerHTML;
              
              // 移除舊版的星星 UI
              originHtml = originHtml.replace(/<div class="star-display-container"([\s\S]*?)<\/div>\s*<\/div>/g, '');
              originHtml = originHtml.replace(/<br>⭐ 提示.*顆/g, '');
              
              // 修正折行問題，將各個統計項目包裝在 nowrap 中
              originHtml = originHtml.replace(/(⏱ 用時.*?秒)/g, '<span style="white-space:nowrap;">$1</span>');
              originHtml = originHtml.replace(/(❌ 錯誤.*?次)/g, '<span style="white-space:nowrap;">$1</span>');
              originHtml = originHtml.replace(/(🎯 正確率.*?%)/g, '<span style="white-space:nowrap;">$1</span>');
              originHtml = originHtml.replace(/　　/g, ' &nbsp;&nbsp; ');

              finalScoreSpan.innerHTML = originHtml + `
                  <div class="star-display-container" style="margin-top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center;">
                      <div style="display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 5px; flex-wrap: nowrap;">
                          ${Array(3).fill(0).map((_, i) => `<span style="font-size: 2.5rem; filter: ${i < stars ? 'drop-shadow(0 0 12px rgba(251,191,36,0.8))' : 'grayscale(100%) opacity(20%)'}; transform: scale(${i < stars ? 1.1 : 1}); transition: all 0.3s ease; line-height: 1;">⭐</span>`).join('')}
                      </div>
                      <div style="font-size: 0.85rem; color: #94a3b8; text-align: center; margin-top: 10px;">
                          ( 使用提示：${hintsCount} 次 )
                      </div>
                  </div>
              `;
          }
          window.saveScore(user.className, user.name, qID + '_' + tID, "錯誤找找看", seconds, "PASS", stars)
            .then(res => console.log("成績上傳完成:", res));
      }
  }

  setupNextLevelButton();
}

function setupNextLevelButton() {
    const LEVEL_SEQUENCE = [
      { q: 'SETUP', t: 'T01' }, { q: 'Q1', t: 'T01' }, { q: 'Q1', t: 'T02' }, { q: 'Q1', t: 'T03' },
      { q: 'Q2', t: 'T01' }, { q: 'Q2', t: 'T02' }, { q: 'Q2', t: 'T03' }, { q: 'Q3', t: 'T01' },
      { q: 'Q3', t: 'T02' }, { q: 'Q3', t: 'T03' }, { q: 'Q4', t: 'T01' }, { q: 'Q4', t: 'T02' },
      { q: 'Q4', t: 'T03' }, { q: 'Q5', t: 'T01' }, { q: 'Q5', t: 'T02' }, { q: 'Q5', t: 'T03' },
      { q: '1060306', t: 'T01' }, { q: '1060307', t: 'T01' }, { q: '1060308', t: 'T01' }
    ];
    let currentIndex = LEVEL_SEQUENCE.findIndex(l => l.q === qID && l.t === tID);
    const nextBtn = document.getElementById('btn-next-level');
    if (currentIndex >= 0 && currentIndex < LEVEL_SEQUENCE.length - 1) {
        const nextLv = LEVEL_SEQUENCE[currentIndex + 1];
        nextBtn.style.display = 'block';
        nextBtn.onclick = () => {
            window.location.href = `錯誤找找看.html?q=${nextLv.q}&t=${nextLv.t}`;
        };
    } else if (currentIndex === LEVEL_SEQUENCE.length - 1) {
        nextBtn.style.display = 'block';
        nextBtn.innerHTML = '🎯 進入第三階段 (排列重組)';
        nextBtn.onclick = () => {
            window.location.href = '程式碼排列重組.html?q=SETUP&t=T01';
        };
    } else {
        nextBtn.style.display = 'none';
        nextBtn.onclick = null;
    }
}

// ══════════ Restart ══════════
document.getElementById('btn-again').addEventListener('click', () => {
  currentQ    = 0;
  correctCount = 0;
  wrongCount   = 0;
  seconds     = 0;
  clearInterval(timerID);
  document.getElementById('overlay').classList.remove('show');
  startTimer();
  renderQuestion();
});

// ══════════ Timer ══════════
function startTimer() {
  seconds = 0;
  clearInterval(timerID);
  timerID = setInterval(() => {
    seconds++;
    document.getElementById('stat-timer').textContent = seconds + 's';
  }, 1000);
}

</script>
<script src="../js/game-toolbar.js"></script>
<script src="../js/nextlevel.js"></script>
</body>
