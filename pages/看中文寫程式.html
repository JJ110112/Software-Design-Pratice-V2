<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="../favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>術科練習 ── 看中文寫程式</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c1220;
  --bg2: #111827;
  --surface: #1a2236;
  --surface2: #212d45;
  --border: #2e3f5c;
  --accent: #38bdf8;
  --accent2: #818cf8;
  --green: #4ade80;
  --gold: #fbbf24;
  --red: #f87171;
  --orange: #fb923c;
  --text: #e2e8f0;
  --muted: #64748b;
  --muted2: #94a3b8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(56,189,248,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(56,189,248,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* ═══ HEADER ═══ */
.page-header { text-align: center; padding: 32px 20px 20px; }
.badge-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; flex-wrap: wrap; }
.badge { font-size: .68rem; font-weight: 900; letter-spacing: .1em; text-transform: uppercase; padding: 3px 12px; border-radius: 2px; }
.badge-blue { background: rgba(56,189,248,.15); color: var(--accent); border: 1px solid rgba(56,189,248,.3); }
.badge-gold { background: rgba(251,191,36,.12); color: var(--gold); border: 1px solid rgba(251,191,36,.3); }
.badge-purple { background: rgba(129, 140, 248, .12); color: var(--accent2); border: 1px solid rgba(129, 140, 248, .3); }

h1 { font-size: clamp(1.5rem, 5vw, 2.4rem); font-weight: 900; letter-spacing: -.02em; line-height: 1.15; }
h1 em { color: var(--accent2); font-style: normal; }
.subtitle { color: var(--muted); font-size: .88rem; margin-top: 8px; }

/* ═══ GAME CONTENT ═══ */
.content { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }

/* Stats Bar */
.stats-bar {
  display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 20px; text-align: center; flex: 1; min-width: 100px;
}
.stat-val { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 700; color: var(--accent); display: block; }
.stat-lbl { font-size: .65rem; color: var(--muted); margin-top: 2px; display: block; }

/* Progress */
.progress-container { margin-bottom: 30px; }
.progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: .8rem; color: var(--muted2); font-weight: 700; }
.progress-track { height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent2); width: 0%; transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

/* Current Step Display */
.step-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 30px; margin-bottom: 24px;
  position: relative; overflow: hidden;
}
.step-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent2);
}
.step-label { font-size: .75rem; font-weight: 900; text-transform: uppercase; letter-spacing: .12em; color: var(--accent2); margin-bottom: 12px; display: block; }
.step-zh { font-size: 1.4rem; font-weight: 700; color: var(--text); line-height: 1.5; margin-bottom: 20px; }

/* Input Area */
.input-wrap { position: relative; }
.code-input {
  width: 100%;
  background: var(--bg2); border: 2px solid var(--border);
  border-radius: 8px; padding: 16px 20px;
  color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 1.1rem;
  transition: all 0.2s; outline: none;
}
.code-input:focus { border-color: var(--accent2); box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.15); }
.code-input.correct { border-color: var(--green); background: rgba(74, 222, 128, 0.05); }
.code-input.wrong { border-color: var(--red); animation: shake 0.4s ease; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-5px); }
  40%, 80% { transform: translateX(5px); }
}

/* History / Code Block */
.code-display {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; font-family: 'JetBrains Mono', monospace;
  font-size: .95rem; line-height: 1.8; overflow-x: auto;
}
.code-line {
  display: flex; gap: 16px; margin-bottom: 2px;
  color: transparent; /* 完全隱藏內容 */
  transition: all 0.4s;
  border-radius: 4px;
}
.code-line.active { 
  background: rgba(255, 255, 255, 0.03); /* 提示目前正在寫這一行，但不顯示字 */
}
.code-line.done { 
  color: var(--green); 
  transform: translateX(4px); 
  background: transparent;
}
.cl-ln { width: 24px; text-align: right; user-select: none; font-size: .75rem; color: var(--muted); opacity: 0.3; }
.cl-txt { white-space: pre-wrap; word-break: break-all; }

/* Buttons */
.btn-row { display: flex; gap: 12px; margin-top: 24px; }
.btn {
  font-family: 'Noto Sans TC', sans-serif; font-weight: 700; font-size: .95rem;
  padding: 12px 28px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s;
}
.btn-primary { background: var(--accent2); color: #fff; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(129, 140, 248, 0.3); }
.btn-ghost { background: transparent; color: var(--muted2); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--muted2); color: var(--text); }

/* Win Overlay */
#overlay {
  display: none; position: fixed; inset: 0; background: rgba(12, 18, 32, 0.9); backdrop-filter: blur(8px);
  z-index: 1000; align-items: center; justify-content: center;
}
#overlay.show { display: flex; }
.win-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 50px; text-align: center; max-width: 450px; width: 90%;
  animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}
@keyframes popUp { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
.win-emoji { font-size: 4rem; margin-bottom: 20px; display: block; }
.win-card h2 { font-size: 2rem; font-weight: 900; margin-bottom: 12px; }
.win-score { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; color: var(--green); background: rgba(74, 222, 128, 0.08); border-radius: 8px; padding: 16px; margin: 20px 0 30px; }

/* Hint Indicator */
.hint-text { margin-top: 12px; font-size: .85rem; color: var(--muted2); display: none; }
.hint-text.show { display: block; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* GAME HEADER */
.game-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.back-btn { background: transparent; border: 1px solid var(--border); color: var(--muted2); border-radius: 6px; padding: 6px 14px; font-size: .82rem; cursor: pointer; text-decoration: none; font-family: inherit; transition: all .2s; }
.back-btn:hover { color: var(--text); border-color: var(--muted2); }
.mode-pill { font-size: .72rem; font-weight: 900; padding: 4px 12px; border-radius: 4px; text-transform: uppercase; letter-spacing: .08em; background: rgba(74, 222, 128, .15); color: var(--green); border: 1px solid rgba(74, 222, 128, .3); }
</style>
<link rel="stylesheet" href="../css/common.css?v=5">
</head>
<body>

<div class="page-header">
  <div class="badge-row">
    <span class="badge badge-blue">軟體設計丙級 · VB.NET</span>
    <span class="badge badge-gold" id="topic-badge">檢定題庫</span>
    <span class="badge badge-purple">看中文寫程式</span>
  </div>
  <h1>實戰開發<br><em>翻譯中文註解為程式碼</em></h1>
  <p class="subtitle">根據畫面上方的中文提示，點亮整段程式碼</p>
</div>

<div class="content">

  <div class="game-header">
    <a href="#" class="back-btn" id="btn-back">← 返回</a>
    <div class="mode-pill lvl-easy" id="mode-pill"></div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <span class="stat-val" id="stat-correct">0</span>
      <span class="stat-lbl">答對行數</span>
    </div>
    <div class="stat-card">
      <span class="stat-val" id="stat-mistakes">0</span>
      <span class="stat-lbl">錯誤次數</span>
    </div>
    <div class="stat-card">
      <span class="stat-val" id="stat-time">0s</span>
      <span class="stat-lbl">挑戰時間</span>
    </div>
  </div>

  <div class="progress-container">
    <div class="progress-header">
      <span id="level-label">進度：0 / 12 行</span>
      <span id="percent-label">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <div class="step-card">
    <span class="step-label" id="step-id">目前目標</span>
    <div class="step-zh" id="step-zh">準備開始...</div>
    <div class="input-wrap">
      <textarea class="code-input" id="code-input" placeholder="在此輸入程式碼..." autocomplete="off" spellcheck="false" rows="3" style="resize: vertical; line-height: 1.5;"></textarea>
    </div>
    <div class="hint-text" id="hint-text">💡 提示：<span id="hint-content"></span></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-submit">確認提交 (Enter)</button>
      <button class="btn btn-ghost" id="btn-hint">顯示提示</button>
      <button class="btn btn-ghost" id="btn-clear-input">清除</button>
    </div>
  </div>

  <div class="code-display" id="code-display">
    <!-- Initialized by JS -->
  </div>

</div>

<div id="overlay">
  <div class="win-card">
    <span class="win-emoji">💎</span>
    <h2>完成開發挑戰！</h2>
    <p>恭喜你！已經能獨立點亮 <span id="win-mission-title">完整的程式片段</span>。</p>
    <div class="win-score" id="win-score-box"></div>
    <div style="display:flex; justify-content:center; gap:10px; margin-top:20px;">
        <button class="btn btn-primary" id="btn-replay">再挑戰一次</button>
        <button class="btn btn-primary" id="btn-next-level" style="display:none;">⏭️ 下一關</button>
    </div>
  </div>
</div>

<script src="../js/users.js"></script>
<script type="module" src="../js/api.js?v=10"></script>
<script src="../js/quiz_data.js"></script>
<script>
// ══════════════════════════════════════════
//  DYNAMIC DATA LOADING
// ══════════════════════════════════════════
const params = new URLSearchParams(window.location.search);
const qID = params.get('q') || 'Q1';
const tID = params.get('t') || 'T01';

const STEPS = generateSteps(qID, tID);

window.addEventListener('load', () => {
    if (QUIZ_DATA[qID]) {
        let labelText = `${qID} ${QUIZ_DATA[qID].title} (${tID})`;
        if (qID === 'SETUP') {
            document.querySelector('h1').innerHTML = `Form1_Load 練習<br><em>翻譯通用考生資訊</em>`;
            labelText = 'Form1_Load (通用考生資訊)';
        } else {
            document.querySelector('h1').innerHTML = `${qID} ${QUIZ_DATA[qID].title}<br><em>翻譯開發實戰 (${tID})</em>`;
        }
                document.getElementById('mode-pill').textContent = labelText;
        
        let winMissionStr = qID === 'SETUP' ? 'Form1_Load' : qID;
        if(document.getElementById('win-mission-title')) document.getElementById('win-mission-title').textContent = `${winMissionStr} 完整的程式片段`;
        if(document.getElementById('topic-badge')) document.getElementById('topic-badge').textContent = `${qID} · ${QUIZ_DATA[qID].title}`;
    }
});

// ══════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════
const AC = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getCtx() { if (!audioCtx) audioCtx = new AC(); return audioCtx; }
function playCorrect(){ try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';const t=c.currentTime;o.frequency.setValueAtTime(523,t);o.frequency.exponentialRampToValueAtTime(880,t+0.1);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.2,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.start(t);o.stop(t+0.3);}catch(e){}}
function playWrong(){ try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';const t=c.currentTime;o.frequency.setValueAtTime(220,t);o.frequency.linearRampToValueAtTime(110,t+0.2);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);o.start(t);o.stop(t+0.25);}catch(e){}}
function playWin(){ try{const c=getCtx(),freqs=[523,659,784,1046];freqs.forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';const t=c.currentTime+(i*0.1);o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.2,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);o.start(t);o.stop(t+0.5);});}catch(e){}}

// ══════════════════════════════════════════
//  GAME LOGIC
// ══════════════════════════════════════════
let currentIdx = 0;
let mistakes = 0;
let seconds = 0;
let timer = null;
let isFinished = false;

const inputEl = document.getElementById('code-input');
inputEl.addEventListener('paste', e => e.preventDefault()); // 禁止貼上
// 手機：鍵盤彈出時自動捲動到輸入區
inputEl.addEventListener('focus', () => {
  if (window.innerWidth <= 768) {
    setTimeout(() => inputEl.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
  }
});
const displayEl = document.getElementById('code-display');
const fillEl = document.getElementById('progress-fill');
const hintText = document.getElementById('hint-text');
const hintContent = document.getElementById('hint-content');

// ══════ BACK BTN ══════
document.getElementById('btn-back').addEventListener('click', (e) => {
    e.preventDefault();
    window.location.href = `../index.html?q=${qID}&t=${tID}`;
});

function initGame() {
  currentIdx = 0;
  mistakes = 0;
  seconds = 0;
  isFinished = false;
  
  // Build initial dimmed code display
  displayEl.innerHTML = '';
  STEPS.forEach((s, idx) => {
    const line = document.createElement('div');
    line.className = 'code-line';
    line.id = `line-${idx}`;
    line.innerHTML = `<span class="cl-ln">${idx + 1}</span><span class="cl-txt">${s.code}</span>`;
    displayEl.appendChild(line);
  });

  document.getElementById('stat-mistakes').textContent = '0';
  document.getElementById('stat-correct').textContent = '0';
  document.getElementById('stat-time').textContent = '0s';
  clearInterval(timer);
  timer = setInterval(() => {
    seconds++;
    document.getElementById('stat-time').textContent = seconds + 's';
  }, 1000);
  
  updateUI();
  inputEl.focus();
}

function updateUI() {
  const total = STEPS.length;
  const pct = Math.round((currentIdx / total) * 100);

  // Update Progress
  document.getElementById('level-label').textContent = `進度：${currentIdx} / ${total} 行`;
  document.getElementById('percent-label').textContent = pct + '%';
  fillEl.style.width = pct + '%';
  
  // Update Current Goal
  if (currentIdx < total) {
    document.getElementById('step-zh').textContent = STEPS[currentIdx].zh;
    const activeLine = document.getElementById(`line-${currentIdx}`);
    if (activeLine) {
        activeLine.classList.add('active');
        activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  inputEl.value = '';
  inputEl.className = 'code-input';
  hintText.classList.remove('show');
}

function checkAnswer() {
  if (isFinished) return;
  const userTxt = inputEl.value.trim();
  const target = STEPS[currentIdx].code;
  const toHalf = (s) => s.replace(/[\uff01-\uff5e]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xfee0)).replace(/\u3000/g, ' ');
  const clean = (s) => toHalf(s).replace(/\s+/g, ' ').trim();
  
  if (clean(userTxt) === clean(target)) {
    handleCorrect();
  } else {
    handleWrong();
  }
}

function handleCorrect() {
  playCorrect();
  inputEl.classList.add('correct');
  
  const doneLine = document.getElementById(`line-${currentIdx}`);
  if (doneLine) {
    doneLine.classList.remove('active');
    doneLine.classList.add('done');
  }
  
  currentIdx++;
  document.getElementById('stat-correct').textContent = currentIdx;
  
  if (currentIdx >= STEPS.length) {
    finishGame();
  } else {
    setTimeout(updateUI, 300);
  }
}

function handleWrong() {
  playWrong();
  mistakes++;
  document.getElementById('stat-mistakes').textContent = mistakes;
  inputEl.classList.remove('wrong');
  void inputEl.offsetWidth; 
  inputEl.classList.add('wrong');
}

function finishGame() {
  isFinished = true;
  clearInterval(timer);
  fillEl.style.width = '100%';
  document.getElementById('percent-label').textContent = '100%';
  playWin();
  
  let stars = 3;
  if (mistakes > 0 && mistakes <= 2) stars = 2;
  if (mistakes > 2) stars = 1;
  const scorePct = Math.max(0, Math.round(100 - (mistakes * 4)));
  if (scorePct < 60) stars = 1;

  document.getElementById('win-score-box').innerHTML = `
    挑戰用時：${seconds} 秒<br>
    語法錯誤：${mistakes} 次<br>
    專業開發力：${scorePct}%
    <div class="star-display-container" style="margin-top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div style="display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 5px; flex-wrap: nowrap;">
            ${Array(3).fill(0).map((_, i) => `<span style="font-size: 2.5rem; filter: ${i < stars ? 'drop-shadow(0 0 12px rgba(251,191,36,0.8))' : 'grayscale(100%) opacity(20%)'}; transform: scale(${i < stars ? 1.1 : 1}); transition: all 0.3s ease; line-height: 1;">⭐</span>`).join('')}
        </div>
    </div>
  `;
  
  setTimeout(() => {
    document.getElementById('overlay').classList.add('show');
  }, 600);

  if (typeof getCurrentUser === 'function') {
      const user = getCurrentUser();
      if (user && typeof window.saveScore === 'function') {
          window.saveScore(user.className, user.name, qID + '_' + tID, "看中文寫程式", seconds, "PASS", stars)
            .then(res => console.log("成績上傳完成:", res));
      }
  }

  setupNextLevelButton();
}

function setupNextLevelButton() {
    const LEVEL_SEQUENCE = [
      { q: 'SETUP', t: 'T01' }, { q: 'Q1', t: 'T01' }, { q: 'Q1', t: 'T02' }, { q: 'Q1', t: 'T03' },
      { q: 'Q2', t: 'T01' }, { q: 'Q2', t: 'T02' }, { q: 'Q2', t: 'T03' }, { q: 'Q3', t: 'T01' },
      { q: 'Q3', t: 'T02' }, { q: 'Q3', t: 'T03' }, { q: 'Q4', t: 'T01' }, { q: 'Q4', t: 'T02' },
      { q: 'Q4', t: 'T03' }, { q: 'Q5', t: 'T01' }, { q: 'Q5', t: 'T02' }, { q: 'Q5', t: 'T03' },
      { q: '1060306', t: 'T01' }, { q: '1060307', t: 'T01' }, { q: '1060308', t: 'T01' }
    ];
    let currentIndex = LEVEL_SEQUENCE.findIndex(l => l.q === qID && l.t === tID);
    const nextBtn = document.getElementById('btn-next-level');
    if (currentIndex >= 0 && currentIndex < LEVEL_SEQUENCE.length - 1) {
        const nextLv = LEVEL_SEQUENCE[currentIndex + 1];
        nextBtn.style.display = 'block';
        nextBtn.onclick = () => {
            window.location.href = `看中文寫程式.html?q=${nextLv.q}&t=${nextLv.t}`;
        };
    } else {
        nextBtn.style.display = 'block';
        nextBtn.innerHTML = '🎯 進入第五階段 (獨立全程式撰寫)';
        nextBtn.onclick = () => {
            window.location.href = '獨立全程式撰寫.html?q=SETUP&t=T01';
        };
    }
}

document.getElementById('btn-submit').addEventListener('click', checkAnswer);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    checkAnswer();
  }
});
document.getElementById('btn-hint').addEventListener('click', () => {
  hintContent.textContent = STEPS[currentIdx].hint;
  hintText.classList.add('show');
  inputEl.focus();
});
document.getElementById('btn-clear-input').addEventListener('click', () => {
  inputEl.value = '';
  inputEl.focus();
});
document.getElementById('btn-replay').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
  initGame();
});

window.addEventListener('load', initGame);

</script>
<script src="../js/game-toolbar.js"></script>
</body>
</html>
