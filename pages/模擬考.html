<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="../favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>術科模擬考</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css?v=5">
<style>
:root {
  --bg:#0c1220;--surface:#1a2236;--surface2:#212d45;--border:#2e3f5c;
  --accent:#38bdf8;--purple:#a78bfa;--green:#4ade80;--gold:#fbbf24;--red:#f87171;
  --text:#e2e8f0;--muted:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}

/* DRAW SCREEN */
#draw-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center;}
.draw-title{font-size:2.5rem;font-weight:900;margin-bottom:10px;background:linear-gradient(135deg,#f59e0b,#ef4444);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.draw-sub{color:var(--muted);margin-bottom:40px;font-size:1rem;}
.draw-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:30px;max-width:500px;width:100%;margin-bottom:30px;text-align:left;}
.draw-card h3{color:var(--gold);margin-bottom:15px;font-size:1.1rem;}
.draw-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:8px;font-weight:700;display:flex;align-items:center;gap:10px;}
.draw-item .tag{font-size:.7rem;padding:2px 8px;border-radius:4px;background:rgba(251,191,36,.15);color:var(--gold);font-weight:900;}
.draw-info{color:var(--muted);font-size:.85rem;margin-top:12px;}
.btn-start{padding:16px 48px;font-size:1.2rem;font-weight:900;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(90deg,#f59e0b,#ef4444);color:#fff;font-family:inherit;transition:all .2s;box-shadow:0 8px 25px rgba(239,68,68,.3);}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 12px 35px rgba(239,68,68,.4);}

/* EXAM SCREEN */
#exam-screen{display:none;min-height:100vh;}
.exam-top{position:fixed;top:0;left:0;right:0;z-index:9000;background:linear-gradient(90deg,rgba(245,158,11,.15),rgba(239,68,68,.15),rgba(15,23,42,.9));backdrop-filter:blur(12px);border-bottom:2px solid #f59e0b;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:15px;flex-wrap:wrap;}
.exam-timer{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:900;color:#f59e0b;min-width:100px;text-align:center;}
.exam-timer.warning{color:var(--red);animation:timerBlink 1s infinite;}
@keyframes timerBlink{50%{opacity:.4}}
.exam-tabs{display:flex;gap:6px;flex-wrap:wrap;}
.exam-tab{padding:6px 14px;border-radius:6px;font-size:.8rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s;}
.exam-tab.active{background:var(--gold);color:#000;border-color:var(--gold);}
.exam-tab.done{background:rgba(74,222,128,.2);color:var(--green);border-color:var(--green);}
.exam-progress{font-size:.85rem;color:var(--muted);font-weight:700;}

.exam-body{padding:80px 20px 40px;max-width:900px;margin:0 auto;}
.exam-q-title{font-size:1.3rem;font-weight:900;margin-bottom:20px;color:var(--gold);}

/* IDE */
.ide-box{background:#111827;border:2px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 15px 40px rgba(0,0,0,.4);}
.ide-header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px;}
.dot{width:10px;height:10px;border-radius:50%;}.dot-r{background:#ff5f56}.dot-y{background:#ffbd2e}.dot-g{background:#27c93f}
.ide-fname{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.75rem;margin-left:auto;}
.ide-body{display:flex;min-height:400px;}
.ide-ln{background:rgba(255,255,255,.02);color:#334155;padding:16px 0;width:40px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:.9rem;line-height:1.6;user-select:none;}
.ide-ln span{display:block;padding-right:10px;}
.ide-editor{flex:1;position:relative;}
.ide-editor textarea{width:100%;height:100%;background:transparent;border:none;outline:none;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:1rem;padding:16px;line-height:1.6;resize:none;white-space:pre;caret-color:var(--gold);}
.ide-status{padding:8px 16px;font-size:.8rem;color:var(--muted);display:flex;justify-content:space-between;border-top:1px solid var(--border);}
.ide-status .ok{color:var(--green);}

.exam-hint-btn{margin-top:15px;padding:8px 20px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;transition:all .2s;}
.exam-hint-btn:hover{border-color:var(--gold);color:var(--gold);}
.exam-hint-box{margin-top:12px;padding:16px;background:rgba(251,191,36,.05);border:1px dashed var(--gold);border-radius:8px;display:none;color:var(--text);font-size:.95rem;}

/* RESULT */
#result-screen{display:none;position:fixed;inset:0;background:rgba(12,18,32,.95);z-index:10000;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
#result-screen.show{display:flex;}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:50px 40px;max-width:520px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.result-card h2{font-size:2rem;font-weight:900;margin:15px 0 8px;}
.result-detail{margin:25px 0;text-align:left;font-size:1rem;line-height:2.2;color:var(--text);}
.result-detail .q-result{display:flex;justify-content:space-between;padding:6px 12px;border-radius:6px;margin-bottom:4px;}
.result-detail .q-result.pass{background:rgba(74,222,128,.1);}
.result-detail .q-result.fail{background:rgba(248,113,113,.1);}
</style>
</head>
<body>

<!-- 1. DRAW SCREEN -->
<div id="draw-screen">
  <div class="draw-title">模擬考試</div>
  <div class="draw-sub">依照檢定規則隨機抽題，限時 125 分鐘完成</div>

  <div class="draw-card">
    <h3>📋 抽題結果</h3>
    <div id="draw-list"></div>
    <div class="draw-info" id="draw-info"></div>
  </div>

  <button class="btn-start" id="btn-start-exam">開始考試 (125 分鐘)</button>
</div>

<!-- 2. EXAM SCREEN -->
<div id="exam-screen">
  <div class="exam-top">
    <div class="exam-timer" id="exam-timer">125:00</div>
    <div class="exam-tabs" id="exam-tabs"></div>
    <div class="exam-progress" id="exam-progress">0 / 5</div>
  </div>

  <div class="exam-body">
    <div class="exam-q-title" id="exam-q-title"></div>

    <div class="ide-box">
      <div class="ide-header">
        <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
        <div class="ide-fname" id="ide-fname"></div>
      </div>
      <div class="ide-body">
        <div class="ide-ln" id="ide-ln"></div>
        <div class="ide-editor">
          <textarea id="editor" spellcheck="false"></textarea>
        </div>
      </div>
      <div class="ide-status">
        <span id="ide-status-text">Ready</span>
        <span id="ide-progress">0%</span>
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:15px;flex-wrap:wrap;">
      <button class="exam-hint-btn" id="btn-hint">💡 獲得邏輯提示</button>
      <button class="exam-hint-btn" id="btn-exam-clear-line">⌫ 清除一行</button>
      <button class="exam-hint-btn" id="btn-exam-clear">🔄 全部清除</button>
    </div>
    <div class="exam-hint-box" id="hint-box"></div>
  </div>
</div>

<!-- 3. RESULT SCREEN -->
<div id="result-screen">
  <div class="result-card">
    <span style="font-size:5rem;display:block;" id="result-icon">🏆</span>
    <h2 id="result-title">考試結束</h2>
    <p id="result-sub" style="color:var(--muted);"></p>
    <div class="result-detail" id="result-detail"></div>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:20px;">
      <button class="btn-start" style="font-size:1rem;padding:12px 30px;" onclick="location.reload()">再考一次</button>
      <button class="btn-start" style="font-size:1rem;padding:12px 30px;background:linear-gradient(90deg,#38bdf8,#a78bfa);" onclick="location.href='map.html?tab=map'">返回地圖</button>
    </div>
  </div>
</div>

<script src="../js/users.js"></script>
<script type="module" src="../js/api.js?v=10"></script>
<script src="../js/quiz_data.js"></script>
<script>
// ══════════════════════════════════════════
//  EXAM CONFIG
// ══════════════════════════════════════════
const EXAM_MINUTES = 125;
const Q_POOL = ['Q1','Q2','Q3','Q4','Q5'];
const SET2_POOL = ['1060306','1060307','1060308'];
const T_POOL = ['T01','T02','T03'];

// ══════════════════════════════════════════
//  DRAW QUESTIONS
// ══════════════════════════════════════════
function shuffle(arr) { for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }

const drawnQs = shuffle([...Q_POOL]).slice(0, 3).sort();
const drawnT = T_POOL[Math.floor(Math.random() * T_POOL.length)];
const drawnSet2 = SET2_POOL[Math.floor(Math.random() * SET2_POOL.length)];

const LOOP_NAMES = { T01:'For...Next', T02:'Do While...Loop', T03:'Do...Loop While / Until' };

// Build exam question list: SETUP + 3 Qs + 1 Set2
const examQuestions = [
  { qID:'SETUP', tID:'T01', label:'Form1_Load 通用表頭' },
  ...drawnQs.map(q => ({ qID:q, tID:drawnT, label:`${q} ${QUIZ_DATA[q]?.title || ''} (${drawnT})` })),
  { qID:drawnSet2, tID:'T01', label:`${drawnSet2} ${QUIZ_DATA[drawnSet2]?.title || ''} (第二套)` }
];

// Render draw results
const drawList = document.getElementById('draw-list');
examQuestions.forEach((eq, i) => {
  const tag = i === 0 ? '通用' : i <= 3 ? '第一套' : '第二套';
  drawList.innerHTML += `<div class="draw-item"><span class="tag">${tag}</span>${eq.label}</div>`;
});
document.getElementById('draw-info').innerHTML =
  `迴圈指令：<b style="color:var(--accent)">${LOOP_NAMES[drawnT]}</b><br>` +
  `第一套抽中：<b>${drawnQs.join(', ')}</b><br>第二套抽中：<b>${drawnSet2}</b>`;

// ══════════════════════════════════════════
//  EXAM STATE
// ══════════════════════════════════════════
let currentQ = 0;
let answers = examQuestions.map(() => '');
let hintCounts = examQuestions.map(() => 0);
let solutions = [];
let timerInterval = null;
let remainingSeconds = EXAM_MINUTES * 60;

// Pre-generate solutions
examQuestions.forEach(eq => {
  const steps = generateSteps(eq.qID, eq.tID);
  solutions.push(steps);
});

// ══════════════════════════════════════════
//  START EXAM
// ══════════════════════════════════════════
document.getElementById('btn-start-exam').addEventListener('click', () => {
  document.getElementById('draw-screen').style.display = 'none';
  document.getElementById('exam-screen').style.display = 'block';
  buildTabs();
  loadQuestion(0);
  updateTimerDisplay();
  startTimer();
});

function buildTabs() {
  const tabs = document.getElementById('exam-tabs');
  tabs.innerHTML = '';
  examQuestions.forEach((eq, i) => {
    const btn = document.createElement('span');
    btn.className = 'exam-tab' + (i === 0 ? ' active' : '');
    btn.textContent = i === 0 ? 'SETUP' : (i <= 3 ? eq.qID : eq.qID);
    btn.dataset.idx = i;
    btn.addEventListener('click', () => {
      saveCurrentAnswer();
      loadQuestion(i);
    });
    tabs.appendChild(btn);
  });
}

function loadQuestion(idx) {
  currentQ = idx;
  const eq = examQuestions[idx];
  const steps = solutions[idx];

  // Update tabs
  document.querySelectorAll('.exam-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });

  // Title & filename
  document.getElementById('exam-q-title').textContent =
    idx === 0 ? 'Form1_Load — 通用考生資訊' :
    `${eq.qID} ${QUIZ_DATA[eq.qID]?.title || ''} (${eq.tID})`;
  document.getElementById('ide-fname').textContent =
    idx === 0 ? 'Form1_Load.vb' : `${eq.qID}_${QUIZ_DATA[eq.qID]?.title || ''}.vb`;

  // Line numbers
  document.getElementById('ide-ln').innerHTML =
    steps.map((_, i) => `<span>${i+1}</span>`).join('');

  // Restore answer
  const editor = document.getElementById('editor');
  editor.value = answers[idx];
  editor.placeholder = idx === 0
    ? '從 RichTextBox1.Text &= ... 開始'
    : "從註解標頭 '*******... 開始";

  // Hide hint
  document.getElementById('hint-box').style.display = 'none';

  validateCurrent();
  editor.focus();
}

function saveCurrentAnswer() {
  answers[currentQ] = document.getElementById('editor').value;
}

// ══════════════════════════════════════════
//  VALIDATION
// ══════════════════════════════════════════
function normalize(str) {
  const toHalf = s => s.replace(/[\uff01-\uff5e]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xfee0)).replace(/\u3000/g, ' ');
  return toHalf(str).trim().replace(/\s+/g, ' ').toLowerCase();
}

function validateCurrent() {
  const steps = solutions[currentQ];
  const content = document.getElementById('editor').value;
  const userLines = content.split('\n').filter(l => l.trim().length > 0);

  let correct = 0;
  for (let i = 0; i < steps.length; i++) {
    if (i < userLines.length && normalize(userLines[i]) === normalize(steps[i].code)) {
      correct++;
    } else break;
  }

  const pct = Math.round((correct / steps.length) * 100);
  document.getElementById('ide-progress').textContent = pct + '%';

  const statusEl = document.getElementById('ide-status-text');
  if (correct === steps.length) {
    statusEl.textContent = '✅ 完成！';
    statusEl.className = 'ok';
    // Mark tab as done
    const tabs = document.querySelectorAll('.exam-tab');
    tabs[currentQ].classList.add('done');
  } else if (correct > 0) {
    statusEl.textContent = `第 ${correct + 1} 行...`;
    statusEl.className = '';
  } else {
    statusEl.textContent = 'Ready';
    statusEl.className = '';
  }

  updateProgress();
}

function updateProgress() {
  let done = 0;
  examQuestions.forEach((_, i) => {
    const steps = solutions[i];
    const lines = answers[i].split('\n').filter(l => l.trim().length > 0);
    let ok = true;
    for (let j = 0; j < steps.length; j++) {
      if (j >= lines.length || normalize(lines[j]) !== normalize(steps[j].code)) { ok = false; break; }
    }
    if (ok && lines.length >= steps.length) done++;
  });
  document.getElementById('exam-progress').textContent = `${done} / ${examQuestions.length} 題完成`;

  if (done === examQuestions.length) {
    setTimeout(() => finishExam(false), 500);
  }
}

// ══════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════
function startTimer() {
  timerInterval = setInterval(() => {
    remainingSeconds--;
    if (remainingSeconds <= 0) {
      clearInterval(timerInterval);
      remainingSeconds = 0;
      finishExam(true);
    }
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(remainingSeconds / 60);
  const s = remainingSeconds % 60;
  const el = document.getElementById('exam-timer');
  const h = Math.floor(m / 60);
  const mm = m % 60;
  const timeStr = h > 0
    ? `${h} 時 ${String(mm).padStart(2,'0')} 分 ${String(s).padStart(2,'0')} 秒`
    : `${mm} 分 ${String(s).padStart(2,'0')} 秒`;
  el.textContent = `剩餘時間：${timeStr}`;
  el.classList.toggle('warning', remainingSeconds < 300); // last 5 min
}

// ══════════════════════════════════════════
//  HINTS
// ══════════════════════════════════════════
document.getElementById('btn-hint').addEventListener('click', () => {
  hintCounts[currentQ]++;
  const steps = solutions[currentQ];
  const content = document.getElementById('editor').value;
  const userLines = content.split('\n').filter(l => l.trim().length > 0);

  let nextIdx = 0;
  for (let i = 0; i < steps.length; i++) {
    if (i < userLines.length && normalize(userLines[i]) === normalize(steps[i].code)) {
      nextIdx = i + 1;
    } else break;
  }
  if (nextIdx >= steps.length) nextIdx = steps.length - 1;

  const box = document.getElementById('hint-box');
  box.style.display = 'block';
  box.textContent = `第 ${nextIdx + 1} 行：${steps[nextIdx].zh}`;
});

// 清除一行（游標所在行）
document.getElementById('btn-exam-clear-line').addEventListener('click', () => {
  const ed = document.getElementById('editor');
  const pos = ed.selectionStart;
  const val = ed.value;
  const before = val.lastIndexOf('\n', pos - 1);
  const after = val.indexOf('\n', pos);
  const lineStart = before + 1;
  const lineEnd = after === -1 ? val.length : after + 1;
  ed.value = val.substring(0, lineStart) + val.substring(lineEnd);
  ed.selectionStart = ed.selectionEnd = lineStart;
  ed.focus();
  saveCurrentAnswer();
  validateCurrent();
});

// 全部清除
document.getElementById('btn-exam-clear').addEventListener('click', () => {
  const ed = document.getElementById('editor');
  ed.value = '';
  ed.focus();
  saveCurrentAnswer();
  validateCurrent();
});

// ══════════════════════════════════════════
//  FINISH
// ══════════════════════════════════════════
function finishExam(timeout) {
  clearInterval(timerInterval);
  saveCurrentAnswer();

  const elapsed = EXAM_MINUTES * 60 - remainingSeconds;
  const elapsedMin = Math.floor(elapsed / 60);
  const elapsedSec = elapsed % 60;

  let passCount = 0;
  let detailHtml = '';

  examQuestions.forEach((eq, i) => {
    const steps = solutions[i];
    const lines = answers[i].split('\n').filter(l => l.trim().length > 0);
    let correct = 0;
    for (let j = 0; j < steps.length; j++) {
      if (j < lines.length && normalize(lines[j]) === normalize(steps[j].code)) correct++;
      else break;
    }
    const pass = correct === steps.length;
    if (pass) passCount++;
    const pct = Math.round((correct / steps.length) * 100);
    detailHtml += `<div class="q-result ${pass ? 'pass' : 'fail'}">
      <span>${eq.label}</span>
      <span style="font-weight:900;color:${pass ? 'var(--green)' : 'var(--red)'}">${pass ? '✅ PASS' : `❌ ${pct}%`}</span>
    </div>`;
  });

  const allPass = passCount === examQuestions.length;
  document.getElementById('result-icon').textContent = allPass ? '🏆' : (timeout ? '⏰' : '📝');
  document.getElementById('result-title').textContent = allPass ? '恭喜通過！' : (timeout ? '時間到！' : '考試結束');
  document.getElementById('result-sub').textContent =
    `用時 ${elapsedMin} 分 ${elapsedSec} 秒　通過 ${passCount}/${examQuestions.length} 題` +
    (timeout ? '（超時）' : '');
  document.getElementById('result-detail').innerHTML = detailHtml;
  document.getElementById('result-screen').classList.add('show');

  // Save score
  if (typeof getCurrentUser === 'function') {
    const user = getCurrentUser();
    if (user && typeof window.saveScore === 'function') {
      let stars = allPass ? 3 : (passCount >= 3 ? 2 : 1);
      const examLabel = `${drawnQs.join('+')}_${drawnT}_${drawnSet2}`;
      window.saveScore(user.className, user.name, examLabel, "模擬考", elapsed, allPass ? "PASS" : "FAIL", stars);
    }
  }
}

// ══════════════════════════════════════════
//  EDITOR EVENTS
// ══════════════════════════════════════════
const editor = document.getElementById('editor');
editor.addEventListener('paste', e => e.preventDefault()); // 禁止貼上
editor.addEventListener('input', () => {
  saveCurrentAnswer();
  validateCurrent();
});

editor.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = this.selectionStart;
    const end = this.selectionEnd;
    this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + 4;
    saveCurrentAnswer();
    validateCurrent();
  }
});
</script>
</body>
</html>
