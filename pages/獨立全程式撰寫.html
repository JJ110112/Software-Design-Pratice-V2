<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="../favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>術科練習 ── 第五階段：獨立全程式撰寫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c1220;
  --bg2: #111827;
  --surface: #1a2236;
  --surface2: #212d45;
  --border: #2e3f5c;
  --accent: #38bdf8;
  --accent2: #818cf8; /* Light Purple for Elite */
  --purple: #a78bfa;
  --green: #4ade80;
  --gold: #fbbf24;
  --red: #f87171;
  --text: #e2e8f0;
  --muted: #64748b;
  --muted2: #94a3b8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  padding: 40px 20px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(167, 139, 250, .03) 1px, transparent 1px), linear-gradient(90deg, rgba(167, 139, 250, .03) 1px, transparent 1px);
  background-size: 50px 50px; pointer-events: none;
}

/* HEADER */
.page-header { text-align: center; margin-bottom: 40px; }
.badge { font-size: .7rem; font-weight: 900; letter-spacing: .15em; text-transform: uppercase; padding: 4px 14px; border-radius: 4px; background: rgba(167, 139, 250, 0.15); color: var(--purple); border: 1px solid rgba(167, 139, 250, 0.3); display: inline-block; margin-bottom: 15px; }
h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: 8px; }
h1 em { color: var(--purple); font-style: normal; }
.subtitle { color: var(--muted); font-size: .95rem; }

/* MAIN ZONE */
.content { max-width: 960px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 30px; }

/* Editor Viewport */
.ide-container {
  background: var(--bg2); border: 2px solid var(--border);
  border-radius: 12px; overflow: hidden; position: relative;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.ide-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 18px; display: flex; align-items: center; justify-content: space-between;
}
.ide-dots { display: flex; gap: 8px; }
.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-r { background: #ff5f56; } .dot-y { background: #ffbd2e; } .dot-g { background: #27c93f; }
.ide-title { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: .75rem; letter-spacing: .05em; }

.editor-wrapper { display: flex; min-height: 480px; position: relative; overflow: auto; }
.line-numbers {
  background: rgba(255, 255, 255, 0.02); color: #334155;
  padding: 20px 0; width: 45px; text-align: right;
  font-family: 'JetBrains Mono', monospace; font-size: .9rem; user-select: none;
  line-height: 1.6;
}
.line-numbers span { display: block; padding-right: 12px; }

.editing-area { flex: 1; position: relative; }
textarea {
  width: 100%; height: 100%;
  background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 1rem;
  padding: 20px; line-height: 1.6; resize: none;
  white-space: pre; overflow: hidden;
  caret-color: var(--purple);
}

/* Overlay Info */
.validation-overlay {
  position: absolute; bottom: 20px; right: 20px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 20px; font-size: .85rem;
  display: flex; align-items: center; gap: 15px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  z-index: 10;
}
.status-point { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
.status-point.ok { background: var(--green); box-shadow: 0 0 10px var(--green); }
.status-point.error { background: var(--red); box-shadow: 0 0 10px var(--red); }

/* Buttons & Hints */
.controls { display: flex; gap: 15px; justify-content: center; margin-top: 10px; }
.btn {
  font-family: inherit; font-weight: 700; font-size: .95rem;
  padding: 12px 32px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 8px;
}
.btn-primary { background: var(--purple); color: #fff; }
.btn-primary:hover { filter: brightness(1.1); transform: translateY(-2px); }
.btn-ghost { background: transparent; color: var(--muted2); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--muted2); color: var(--text); }

.hint-box {
  background: rgba(167, 139, 250, 0.05); border: 1px dashed var(--purple);
  border-radius: 10px; padding: 20px; margin-top: 20px; text-align: center;
  display: none; transform: translateY(10px); animation: fadeInUp 0.3s forwards;
}
@keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
.hint-title { font-size: .7rem; text-transform: uppercase; color: var(--purple); margin-bottom: 8px; font-weight: 900; }
.hint-content { font-size: 1.1rem; color: var(--text); font-weight: 500; }

/* WIN OVERLAY */
#win-overlay {
  display: none; position: fixed; inset: 0; background: rgba(12, 18, 32, 0.95);
  z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px);
}
#win-overlay.show { display: flex; }
.win-modal {
  background: var(--surface); border: 1px solid var(--border);
  padding: 60px; border-radius: 20px; text-align: center;
  max-width: 500px; width: 90%; animation: zoomIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes zoomIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.win-icon { font-size: 5rem; display: block; margin-bottom: 20px; }
.win-modal h2 { font-size: 2.2rem; font-weight: 900; margin-bottom: 10px; }
.stat-summary { margin: 25px 0; color: var(--muted2); font-size: 1.1rem; line-height: 1.8; }
.stat-summary b { color: var(--green); font-family: 'JetBrains Mono', monospace; }

/* Indent marker */
.indent-marker { color: var(--muted); opacity: 0.1; }

/* GAME HEADER */
.game-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.back-btn { background: transparent; border: 1px solid var(--border); color: var(--muted2); border-radius: 6px; padding: 6px 14px; font-size: .82rem; cursor: pointer; text-decoration: none; font-family: inherit; transition: all .2s; }
.back-btn:hover { color: var(--text); border-color: var(--muted2); }
.mode-pill { font-size: .72rem; font-weight: 900; padding: 4px 12px; border-radius: 4px; text-transform: uppercase; letter-spacing: .08em; background: rgba(74, 222, 128, .15); color: var(--green); border: 1px solid rgba(74, 222, 128, .3); }
</style>
<link rel="stylesheet" href="../css/common.css?v=5">
</head>
<body>

<div class="page-header">
  <span class="badge">終極挑戰 · 獨立開發</span>
  <h1>全程式<em>白箱撰寫</em></h1>
  <p class="subtitle">不提供參考代碼與註解，請憑記憶完成完整的 Q1 迴文判斷子程序</p>
</div>

<div class="content">

  <div class="game-header">
    <a href="#" class="back-btn" id="btn-back">← 返回</a>
    <div class="mode-pill lvl-easy" id="mode-pill"></div>
  </div>

  <div class="ide-container">
    <div class="ide-header">
      <div class="ide-dots">
        <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
      </div>
      <div class="ide-title" id="ide-title">Q1_Palindrome.vb</div>
      <div style="width: 46px;"></div>
    </div>
    
    <div class="editor-wrapper">
      <div class="line-numbers" id="ln-bar">
        <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span><span>11</span><span>12</span>
      </div>
      <div class="editing-area">
        <textarea id="editor" spellcheck="false" placeholder="' 在此輸入完整的程式碼 ..."></textarea>
      </div>
    </div>

    <div class="validation-overlay">
      <div id="status-point" class="status-point"></div>
      <span id="status-text">Ready to code...</span>
      <span id="progress-text" style="color:var(--muted); font-family: 'JetBrains Mono'; font-weight: 700;">0%</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="btn-submit">🚀 編譯並驗證</button>
    <button class="btn btn-ghost" id="btn-hint">💡 獲得邏輯提示</button>
    <button class="btn btn-ghost" id="btn-clear-line">⌫ 清除一行</button>
    <button class="btn btn-ghost" id="btn-reset">🔄 全部重置</button>
  </div>

  <div class="hint-box" id="hint-box">
    <div class="hint-title">邏輯線索 (Next Logic)</div>
    <div class="hint-content" id="hint-text"></div>
  </div>

</div>

<div id="win-overlay">
  <div class="win-modal">
    <span class="win-icon">💎</span>
    <h2>完成開發挑戰！</h2>
    <p>恭喜你！已經能獨立點亮 <span id="win-mission-title">完整的程式片段</span>。</p>
    <div class="stat-summary" id="win-score-box"></div>
    <div style="display:flex; justify-content:center; gap:10px; margin-top:20px;">
        <button class="btn btn-primary" id="btn-again">再挑戰一次</button>
        <button class="btn btn-primary" id="btn-next-level" style="display:none;">⏭️ 下一關</button>
    </div>
  </div>
</div>

<script src="../js/users.js"></script>
<script type="module" src="../js/api.js?v=10"></script>
<script src="../js/quiz_data.js"></script>
<script>
// ══════════════════════════════════════════
//  DYNAMIC DATA LOADING
// ══════════════════════════════════════════
const params = new URLSearchParams(window.location.search);
const qID = params.get('q') || 'Q1';
const tID = params.get('t') || 'T01';

const SOLUTION_LINES = generateSteps(qID, tID).map(s => ({
    raw: s.code,
    zh: s.zh
}));

// Update Titles
function updateTitles() {
    if (QUIZ_DATA[qID]) {
        let labelText = `${qID} ${QUIZ_DATA[qID].title} (${tID})`;
        if (qID === 'SETUP') {
             document.querySelector('h1').innerHTML = `Form1_Load 練習<br><em>通用考生資訊</em>`;
             labelText = 'Form1_Load (通用考生資訊)';
             document.getElementById('ide-title').textContent = 'Form1_Load.vb';
             editor.placeholder = "' 在此輸入完整的程式碼 ...\n' 提示：從 RichTextBox1.Text &= ... 開始";
        } else {
             document.querySelector('h1').innerHTML = `${qID} ${QUIZ_DATA[qID].title}<br><em>獨立開發挑戰 (${tID})</em>`;
             document.getElementById('ide-title').textContent = `${qID}_${QUIZ_DATA[qID].title}.vb`;
             editor.placeholder = "' 在此輸入完整的程式碼 ...\n' 提示：從註解標頭 '*******... 開始";
        }
        document.getElementById('mode-pill').textContent = labelText;
        if(document.getElementById('topic-badge')) document.getElementById('topic-badge').textContent = `${qID} · ${QUIZ_DATA[qID].title}`;
        document.getElementById('ln-bar').innerHTML = SOLUTION_LINES.map((_, i) => `<span>${i+1}</span>`).join('');
    }
}
if (document.readyState === 'complete') {
    updateTitles();
} else {
    window.addEventListener('load', updateTitles);
}

// ══════════════════════════════════════════
//  AUDIO ENGINE
// ══════════════════════════════════════════
const AC = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getCtx() { if(!audioCtx) audioCtx = new AC(); return audioCtx; }
function tone(f,t,d,v,dt=0){try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;const s=c.currentTime+dt;g.gain.setValueAtTime(v,s);g.gain.exponentialRampToValueAtTime(.001,s+d);o.start(s);o.stop(s+d);}catch(e){}}
function playOk(){tone(523,'sine',.08,.1);tone(659,'sine',.15,.08,.05);}
function playError(){tone(220,'triangle',.2,.15);tone(180,'triangle',.2,.1,.1);}
function playWin(){[523,659,784,1047].forEach((f,i)=>tone(f,'sine',.6,.1,i*.12));}

// ══════════════════════════════════════════
//  CORE LOGIC
// ══════════════════════════════════════════
let currentIdx = 0; // Tracks consecutive correct lines for progress
let hintCount = 0;
let seconds = 0;
let timer = null;
const editor = document.getElementById('editor');

function startTimer() {
  clearInterval(timer); seconds = 0;
  timer = setInterval(() => {
    seconds++;
  }, 1000);
}

// Normalized comparison (remove extra whitespaces, case insensitive if desired, but VB is specific)
function normalize(str) {
  const toHalf = (s) => s.replace(/[\uff01-\uff5e]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xfee0)).replace(/\u3000/g, ' ');
  return toHalf(str).trim().replace(/\s+/g, ' ').toLowerCase();
}

function validate() {
  const content = editor.value;
  const userLines = content.split('\n').filter(l => l.trim().length > 0);
  
  let correctCount = 0;
  let hasError = false;

  for (let i = 0; i < SOLUTION_LINES.length; i++) {
    if (i < userLines.length) {
      if (normalize(userLines[i]) === normalize(SOLUTION_LINES[i].raw)) {
        correctCount++;
      } else {
        hasError = true;
        break; // Stop checking at first error
      }
    } else {
      break;
    }
  }

  // Visual cues
  const dot = document.getElementById('status-point');
  const statText = document.getElementById('status-text');
  const progText = document.getElementById('progress-text');
  
  const progress = Math.round((correctCount / SOLUTION_LINES.length) * 100);
  progText.textContent = progress + '%';

  if (correctCount > currentIdx) {
    playOk();
    currentIdx = correctCount;
    // Auto-scroll logic could be added here
  }

  if (hasError) {
    dot.className = "status-point error";
    statText.textContent = "Syntax error at line " + (correctCount + 1);
  } else if (correctCount === SOLUTION_LINES.length) {
    dot.className = "status-point ok";
    statText.textContent = "All lines valid!";
    win();
  } else {
    dot.className = "status-point";
    statText.textContent = correctCount > 0 ? "Coding in progress..." : "Ready to code...";
  }
}

function win() {
  clearInterval(timer);
  playWin();

  // 計算星星：0 提示 = 3 星, 1~3 提示 = 2 星, >3 提示 = 1 星
  // 速度異常（< 5 秒完成）視為作弊，0 星
  let stars = 3;
  if (seconds < 5) stars = 0;
  else if (hintCount > 0 && hintCount <= 3) stars = 2;
  else if (hintCount > 3) stars = 1;

  // 更新任務標題
  const titleEl = document.getElementById('win-mission-title');
  if (QUIZ_DATA[qID]) {
      titleEl.textContent = `${qID} ${QUIZ_DATA[qID].title} (${tID}) 完整的程式片段`;
  }

  // 顯示成績與星星
  document.getElementById('win-score-box').innerHTML = `
    挑戰用時：${seconds} 秒<br>
    語法錯誤：0 次<br>
    提示使用：${hintCount} 次
    <div style="margin-top: 20px; display: flex; flex-direction: column; align-items: center;">
        <div style="display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 5px;">
            ${Array(3).fill(0).map((_, i) => `<span style="font-size: 2.5rem; filter: ${i < stars ? 'drop-shadow(0 0 12px rgba(251,191,36,0.8))' : 'grayscale(100%) opacity(20%)'}; transform: scale(${i < stars ? 1.1 : 1}); transition: all 0.3s ease; line-height: 1;">⭐</span>`).join('')}
        </div>
    </div>
  `;

  setTimeout(() => {
    document.getElementById('win-overlay').classList.add('show');
  }, 800);

  // 將成績送往雲端 (若已登入)
  if (typeof getCurrentUser === 'function') {
      const user = getCurrentUser();
      if (user && typeof window.saveScore === 'function') {
          window.saveScore(user.className, user.name, qID + '_' + tID, "獨立全程式撰寫", seconds, "PASS", stars)
            .then(res => console.log("成績上傳完成:", res));
      }
  }
}

// ══════════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════════
editor.addEventListener('input', validate);
editor.addEventListener('paste', e => e.preventDefault()); // 禁止貼上

document.getElementById('btn-back').addEventListener('click', (e) => {
    e.preventDefault();
    window.location.href = `../index.html?q=${qID}&t=${tID}`;
});

document.getElementById('btn-submit').addEventListener('click', () => {
    validate();
    if (currentIdx !== SOLUTION_LINES.length) {
        // Find first wrong line and play error if not full
        const userLines = editor.value.split('\n').filter(l => l.trim().length > 0);
        if (userLines.length > 0 && normalize(userLines[currentIdx] || "") !== normalize(SOLUTION_LINES[currentIdx].raw)) {
             playError();
        }
    }
});

document.getElementById('btn-hint').addEventListener('click', () => {
  hintCount++;
  const hintBox = document.getElementById('hint-box');
  const hintTxt = document.getElementById('hint-text');
  
  hintBox.style.display = 'block';
  hintTxt.textContent = SOLUTION_LINES[currentIdx].zh;
  
  setTimeout(() => { hintBox.style.opacity = '1'; }, 10);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  if (confirm("確定要重置所有內容嗎？")) {
    editor.value = '';
    currentIdx = 0;
    hintCount = 0;
    document.getElementById('hint-box').style.display = 'none';
    startTimer();
    validate();
  }
});

document.getElementById('btn-again').addEventListener('click', () => {
  document.getElementById('win-overlay').classList.remove('show');
  editor.value = '';
  init();
});

function init() {
  currentIdx = 0;
  hintCount = 0;
  startTimer();
  validate();
  editor.focus();
}

window.addEventListener('load', init);

// Handle Tab key in textarea
editor.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = this.selectionStart;
    const end = this.selectionEnd;
    this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + 4;
  }
});

// 手機：鍵盤彈出時自動捲動到編輯器
editor.addEventListener('focus', () => {
  if (window.innerWidth <= 768) {
    setTimeout(() => editor.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
  }
});

// 清除一行：刪除游標所在那一行
document.getElementById('btn-clear-line').addEventListener('click', () => {
  const pos = editor.selectionStart;
  const val = editor.value;
  const before = val.lastIndexOf('\n', pos - 1);
  const after = val.indexOf('\n', pos);
  const lineStart = before + 1;
  const lineEnd = after === -1 ? val.length : after + 1;
  editor.value = val.substring(0, lineStart) + val.substring(lineEnd);
  editor.selectionStart = editor.selectionEnd = lineStart;
  editor.focus();
  validate();
});
</script>
<script src="../js/game-toolbar.js"></script>
<script src="../js/nextlevel.js"></script>
</body>
</html>
