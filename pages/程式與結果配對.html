<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="../favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>術科練習 ── 程式與結果配對</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css?v=5">
<style>
/* ═══ GAME SECTION ═══ */
.game-section { padding: 0 12px 40px; max-width: 1400px; margin: 0 auto; }

/* ═══ SECTION LABEL ═══ */
.section-label {
  display: flex; align-items: center; gap: 10px;
  font-size: .75rem; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--muted);
  padding: 0 20px; margin-bottom: 10px;
}
.section-label::before, .section-label::after {
  content:''; flex:1; height:1px; background:var(--border);
}

/* stats */
.stats-bar {
  display: flex; gap: 12px; flex-wrap: wrap;
  justify-content: center; margin-bottom: 20px;
}
.stat-chip {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 18px; text-align: center;
  min-width: 80px;
}
.stat-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.3rem; font-weight: 700; color: var(--accent);
  display: block;
}
.stat-lbl { font-size: .65rem; color: var(--muted); margin-top: 1px; display:block; }

/* instruction */
.instr {
  text-align:center; font-size:.82rem; color:var(--muted);
  margin-bottom:20px; line-height:1.6;
}
.instr strong { color:var(--accent); }

/* ── PREVIEW PHASE BANNER ── */
#preview-banner {
  background: rgba(251,191,36,.08);
  border: 1px solid rgba(251,191,36,.3);
  border-radius: 10px;
  padding: 16px 24px;
  text-align: center;
  margin-bottom: 20px;
  color: var(--gold);
  font-size: .88rem;
  line-height: 1.6;
}
#preview-banner strong { font-size: 1rem; display:block; margin-bottom:4px; }
#preview-banner.hidden { display: none; }

/* ── MATCHING ARENA ── */
.arena {
  position: relative;
  width: 100%;
}

svg#lines-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 5;
  overflow: visible;
}

.columns {
  display: grid;
  grid-template-columns: 1fr 120px 1fr;
  position: relative;
  z-index: 10;
}

@media(max-width:800px) {
  .columns { grid-template-columns: 1fr 60px 1fr; }
}

.col { display: flex; flex-direction: column; gap: 16px; }
.col-label {
  text-align:center; font-size:.8rem; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase;
  color:var(--muted); margin-bottom:8px;
}

/* item chips */
.item {
  background: #0d1117;
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  cursor: pointer;
  transition: border-color .18s, background .18s, transform .15s;
  user-select: none;
  position: relative;
  -webkit-tap-highlight-color: transparent;
  min-height: 100px;
  display: flex;
  align-items: center;
}

.item.preview-mode {
  cursor: default;
  opacity: .85;
}
.item.preview-mode:hover { transform: none; border-color: var(--border); }

.item:hover:not(.matched):not(.wrong-flash):not(.preview-mode) {
  border-color: var(--accent);
  background: #161b22;
  transform: translateX(2px);
}
.item.selected {
  border-color: var(--accent);
  background: rgba(56,189,248,.08);
  box-shadow: 0 0 0 3px rgba(56,189,248,.2);
}
.item.matched {
  border-color: var(--green);
  background: rgba(74,222,128,.05);
  cursor: default;
  opacity: .75;
}
.item.wrong-flash {
  border-color: var(--red);
  background: rgba(248,113,113,.08);
  animation: wrongShake .4s ease;
}
@keyframes wrongShake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)}
  60%{transform:translateX(6px)} 80%{transform:translateX(-3px)}
}

/* dot connector */
.dot-port {
  position:absolute; top:50%;
  width:12px; height:12px; border-radius:50%;
  background:var(--border); border:3px solid var(--bg2);
  transform:translateY(-50%);
  transition:background .2s;
  z-index:20;
}
.col:first-child .item .dot-port { right:-7.5px; }
.col:last-child  .item .dot-port { left:-7.5px; }
.item.selected .dot-port, .item:hover:not(.matched):not(.preview-mode) .dot-port { background:var(--accent); }
.item.matched .dot-port { background:var(--green); }

/* code text in left col */
.item-code {
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(.8rem,1.5vw,1rem);
  font-weight:700;
  word-break:keep-all;
  white-space: pre-wrap;
  line-height:1.4;
  color: #c9d1d9;
  width: 100%;
}
/* result text in right col */
.item-result {
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(.8rem,1.5vw,1rem);
  font-weight:700;
  line-height:1.5;
  color:var(--green);
  width: 100%;
  white-space: pre-wrap;
}

</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="page-header">
  <div class="badge-row">
    <span class="badge badge-blue">軟體設計丙級 · VB.NET</span>
    <span class="badge badge-gold" id="topic-badge">檢定題庫</span>
  </div>
  <h1>配對連連看<br><em>程式方塊 × 執行結果</em></h1>
  <p class="subtitle">追蹤左邊每段程式碼的邏輯，找出右邊對應的執行結果！</p>
</div>

<!-- ═══ GAME SECTION ═══ -->
<div class="game-section">
  <div class="game-header" style="justify-content: flex-start; margin-bottom: 12px;">
    <a href="#" class="back-btn" id="btn-back">← 返回</a>
    <div class="mode-pill lvl-easy" id="mode-pill">程式與結果配對</div>
  </div>

  <div class="section-label">連連看遊戲區</div>

  <div class="stats-bar" id="stats-bar" style="display:none;">
    <div class="stat-chip"><span class="stat-val" id="stat-matched">0</span><span class="stat-lbl">已配對</span></div>
    <div class="stat-chip"><span class="stat-val" id="stat-total">0</span><span class="stat-lbl">總題數</span></div>
    <div class="stat-chip"><span class="stat-val" id="stat-wrong">0</span><span class="stat-lbl">錯誤次數</span></div>
    <div class="stat-chip"><span class="stat-val" id="stat-timer">0s</span><span class="stat-lbl">時間</span></div>
  </div>

  <div id="preview-banner">
    <strong>📖 預覽對照</strong>
    先研讀左側程式碼方塊的邏輯推演結果，按下「開始挑戰」後將打亂排列順序！
  </div>

  <p class="instr" id="game-instr" style="display:none;">
    <strong>① 點選</strong>左側程式碼方塊 &nbsp;→&nbsp; <strong>② 點選</strong>右側對應的執行結果 &nbsp;→&nbsp; 連線配對！
  </p>

  <div class="arena" id="arena">
    <svg id="lines-canvas" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="columns">
      <div class="col" id="col-left">
        <div class="col-label">🖥️ 程式方塊</div>
      </div>
      <div class="col-spacer"></div>
      <div class="col" id="col-right">
        <div class="col-label">🚀 執行結果</div>
      </div>
    </div>
  </div>

  <div class="btn-row" id="btn-row">
    <button class="btn btn-gold" id="btn-start">▶ 開始挑戰</button>
  </div>
  <div class="btn-row" id="btn-row-game" style="display:none;">
    <button class="btn btn-primary" id="btn-restart">🔄 重新開始</button>
    <button class="btn btn-ghost" id="btn-hint" style="border-color: var(--gold); color: var(--gold); margin-left: 15px;">💡 提示</button>
  </div>
</div>

<div id="overlay">
  <div class="overlay-card">
    <div class="big-emoji">🎯</div>
    <h2>推理王出現了！</h2>
    <p>你已經完全掌握此邏輯區塊的執行推論！</p>
    <div class="score-display" id="final-score"></div>
    <div style="display:flex; justify-content:center; gap:10px; margin-top:20px;">
        <button class="btn btn-primary" id="btn-again">再次挑戰</button>
        <button class="btn btn-primary" id="btn-next-level" style="display:none;">⏭️ 下一關</button>
    </div>
  </div>
</div>

<script src="../js/users.js"></script>
<script type="module" src="../js/api.js?v=10"></script>
<script src="../js/quiz_data.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const qID = urlParams.get('q') || 'Q1';
const tID = urlParams.get('t') || 'T01';

let ALL_PAIRS = [];

window.addEventListener('load', () => {
    if (QUIZ_DATA[qID]) {
        let labelText = `${qID} ${QUIZ_DATA[qID].title} (${tID})`;
        document.getElementById('mode-pill').textContent = labelText;
        if(document.getElementById('topic-badge')) document.getElementById('topic-badge').textContent = `${qID} · ${QUIZ_DATA[qID].title}`;
        
        // Load data specific to this game mode
        if (QUIZ_DATA[qID].variant_match_results && QUIZ_DATA[qID].variant_match_results[tID]) {
            ALL_PAIRS = QUIZ_DATA[qID].variant_match_results[tID];
        } else if(QUIZ_DATA[qID].match_results) {
            ALL_PAIRS = QUIZ_DATA[qID].match_results;
        } else {
            // Fallback for missing game mode data
            document.getElementById('preview-banner').innerHTML = '<strong>⚠️ 題庫建置中</strong>目前尚無此題組的配對測資！';
            document.getElementById('btn-start').disabled = true;
        }

        if(ALL_PAIRS.length > 0) showPreview();
    }
});

document.getElementById('btn-back').addEventListener('click', (e) => {
    e.preventDefault();
    window.location.href = `../index.html?q=${qID}&t=${tID}`;
});

let pairs = [];
let selectedLeft  = null;
let selectedRight = null;
let matchedCount  = 0;
let wrongCount    = 0;
let seconds       = 0;
let timerID       = null;
let lines         = [];
let isPreview     = true;
let totalHintsUsed = 0;

const AC = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAC() { if (!audioCtx) audioCtx = new AC(); return audioCtx; }
function playCorrect() { /* omitted long audio buffer */ }
function playWrong() { /* omitted long audio buffer */ }
function playWin() { /* omitted long audio buffer */ }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showPreview() {
  isPreview = true;
  clearInterval(timerID);
  
  pairs = ALL_PAIRS; // Unshuffled

  document.getElementById('preview-banner').classList.remove('hidden');
  document.getElementById('stats-bar').style.display = 'none';
  document.getElementById('game-instr').style.display = 'none';
  document.getElementById('btn-row').style.display = 'flex';
  document.getElementById('btn-row-game').style.display = 'none';
  document.getElementById('overlay').classList.remove('show');

  renderPreview();
}

function renderPreview() {
  const colL = document.getElementById('col-left');
  const colR = document.getElementById('col-right');

  colL.innerHTML = '<div class="col-label">🖥️ 程式方塊</div>';
  colR.innerHTML = '<div class="col-label">🚀 執行結果</div>';

  const svg = document.getElementById('lines-canvas');
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  lines = [];

  pairs.forEach((p, idx) => {
    const lEl = document.createElement('div');
    lEl.className = 'item preview-mode';
    lEl.dataset.idx = idx;
    lEl.dataset.side = 'left';
    lEl.innerHTML = `
      <div class="item-code">${escHtml(p.code)}</div>
      <div class="dot-port"></div>`;
    colL.appendChild(lEl);

    const rEl = document.createElement('div');
    rEl.className = 'item preview-mode';
    rEl.dataset.idx = idx;
    rEl.dataset.side = 'right';
    rEl.innerHTML = `
      <div class="item-result">${escHtml(p.result)}</div>
      <div class="dot-port"></div>`;
    colR.appendChild(rEl);
  });

  requestAnimationFrame(() => drawPreviewLines());
}

function drawPreviewLines() {
  const svg = document.getElementById('lines-canvas');
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  pairs.forEach((_, idx) => {
    const lEl = document.querySelector(`#col-left .item[data-idx="${idx}"]`);
    const rEl = document.querySelector(`#col-right .item[data-idx="${idx}"]`);
    if (!lEl || !rEl) return;

    const lPos = getPortPos(lEl, 'left');
    const rPos = getPortPos(rEl, 'right');
    const cx = (lPos.x + rPos.x) / 2;
    const d = `M${lPos.x},${lPos.y} C${cx},${lPos.y} ${cx},${rPos.y} ${rPos.x},${rPos.y}`;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', d);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','rgba(56,189,248,.3)');
    path.setAttribute('stroke-width','2');
    path.setAttribute('stroke-dasharray','8,6');
    path.setAttribute('stroke-linecap','round');
    svg.appendChild(path);
  });
}

function startGame() {
  window.scrollTo(0, 0);
  isPreview = false;
  clearInterval(timerID);
  seconds = 0; wrongCount = 0; matchedCount = 0; totalHintsUsed = 0;
  selectedLeft = null; selectedRight = null;

  const svg = document.getElementById('lines-canvas');
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  lines = [];

  document.getElementById('preview-banner').classList.add('hidden');
  document.getElementById('stats-bar').style.display = 'flex';
  document.getElementById('game-instr').style.display = 'block';
  document.getElementById('btn-row').style.display = 'none';
  document.getElementById('btn-row-game').style.display = 'flex';
  document.getElementById('overlay').classList.remove('show');

  document.getElementById('stat-wrong').textContent = '0';
  document.getElementById('stat-matched').textContent = '0';
  document.getElementById('stat-timer').textContent = '0s';

  // For visual block puzzles we mostly show all items from data since it's around 3~5 items
  pairs = shuffle([...ALL_PAIRS]);
  document.getElementById('stat-total').textContent = pairs.length;

  renderColumns();

  timerID = setInterval(() => {
    seconds++;
    document.getElementById('stat-timer').textContent = seconds + 's';
  }, 1000);
}

function renderColumns() {
  const colL = document.getElementById('col-left');
  const colR = document.getElementById('col-right');

  colL.innerHTML = '<div class="col-label">🖥️ 程式方塊</div>';
  colR.innerHTML = '<div class="col-label">🚀 執行結果</div>';

  const rightOrder = shuffle(pairs.map((_,i)=>i));

  pairs.forEach((p, idx) => {
    const lEl = document.createElement('div');
    lEl.className = 'item';
    lEl.dataset.idx = idx;
    lEl.dataset.side = 'left';
    lEl.innerHTML = `
      <div class="item-code">${escHtml(p.code)}</div>
      <div class="dot-port"></div>`;
    lEl.addEventListener('click', () => onItemClick(lEl));
    colL.appendChild(lEl);
  });

  rightOrder.forEach(idx => {
    const p = pairs[idx];
    const rEl = document.createElement('div');
    rEl.className = 'item';
    rEl.dataset.idx = idx;
    rEl.dataset.side = 'right';
    rEl.innerHTML = `
      <div class="item-result">${escHtml(p.result)}</div>
      <div class="dot-port"></div>`;
    rEl.addEventListener('click', () => onItemClick(rEl));
    colR.appendChild(rEl);
  });
}

function onItemClick(el) {
  if (el.classList.contains('matched') || el.classList.contains('preview-mode')) return;
  const side = el.dataset.side;

  if (side === 'left') {
    if (selectedLeft) selectedLeft.classList.remove('selected');
    if (selectedLeft === el) { selectedLeft = null; return; }
    selectedLeft = el;
    el.classList.add('selected');
  } else {
    if (selectedRight) selectedRight.classList.remove('selected');
    if (selectedRight === el) { selectedRight = null; return; }
    selectedRight = el;
    el.classList.add('selected');
  }

  if (selectedLeft && selectedRight) checkMatch();
}

function checkMatch() {
  const lIdx = parseInt(selectedLeft.dataset.idx);
  const rIdx = parseInt(selectedRight.dataset.idx);

  if (pairs[lIdx].result === pairs[rIdx].result) {
    selectedLeft.classList.remove('selected');
    selectedRight.classList.remove('selected');
    selectedLeft.classList.add('matched');
    selectedRight.classList.add('matched');

    drawLine(selectedLeft, selectedRight, 'matched');
    matchedCount++;
    document.getElementById('stat-matched').textContent = matchedCount;
    selectedLeft = null; selectedRight = null;

    if (matchedCount === pairs.length) {
      clearInterval(timerID);
      setTimeout(showWin, 600);
    }
  } else {
    const lRef = selectedLeft, rRef = selectedRight;
    lRef.classList.add('wrong-flash');
    rRef.classList.add('wrong-flash');
    const tmpLine = drawLine(lRef, rRef, 'wrong');
    wrongCount++;
    document.getElementById('stat-wrong').textContent = wrongCount;

    setTimeout(() => {
      lRef.classList.remove('selected','wrong-flash');
      rRef.classList.remove('selected','wrong-flash');
      if (tmpLine && tmpLine.parentNode) tmpLine.parentNode.removeChild(tmpLine);
    }, 700);
    selectedLeft = null; selectedRight = null;
  }
}

function showWin() {
  document.getElementById('final-score').innerHTML =
    `⏱ 用時 ${seconds} 秒　　❌ 錯誤 ${wrongCount} 次`;
  document.getElementById('overlay').classList.add('show');

  // 將成績送往雲端 (若已登入)
  if (typeof getCurrentUser === 'function') {
      const user = getCurrentUser();
      if (user && typeof window.saveScore === 'function') {
          
          let stars = 3;
          if (typeof totalHintsUsed !== 'undefined') {
              if (totalHintsUsed > 0 && totalHintsUsed <= 3) stars = 2;
              if (totalHintsUsed > 3) stars = 1;
          }
          let finalScoreSpan = document.getElementById('final-score');
          if (finalScoreSpan) {
              finalScoreSpan.style.width = "calc(100% + 40px)";
              finalScoreSpan.style.marginLeft = "-20px";
              finalScoreSpan.style.padding = "20px 10px 25px 10px";
              finalScoreSpan.style.boxSizing = "border-box";
              const hintsCount = typeof totalHintsUsed !== 'undefined' ? totalHintsUsed : 0;
              let originHtml = finalScoreSpan.innerHTML;
              
              // 移除舊版的星星 UI
              originHtml = originHtml.replace(/<div class="star-display-container"([\s\S]*?)<\/div>\s*<\/div>/g, '');
              originHtml = originHtml.replace(/<br>⭐ 提示.*顆/g, '');
              
              // 修正折行問題，將各個統計項目包裝在 nowrap 中
              originHtml = originHtml.replace(/(⏱ 用時.*?秒)/g, '<span style="white-space:nowrap;">$1</span>');
              originHtml = originHtml.replace(/(❌ 錯誤.*?次)/g, '<span style="white-space:nowrap;">$1</span>');
              originHtml = originHtml.replace(/(🎯 正確率.*?%)/g, '<span style="white-space:nowrap;">$1</span>');
              originHtml = originHtml.replace(/　　/g, ' &nbsp;&nbsp; ');

              finalScoreSpan.innerHTML = originHtml + `
                  <div class="star-display-container" style="margin-top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center;">
                      <div style="display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 5px; flex-wrap: nowrap;">
                          ${Array(3).fill(0).map((_, i) => `<span style="font-size: 2.5rem; filter: ${i < stars ? 'drop-shadow(0 0 12px rgba(251,191,36,0.8))' : 'grayscale(100%) opacity(20%)'}; transform: scale(${i < stars ? 1.1 : 1}); transition: all 0.3s ease; line-height: 1;">⭐</span>`).join('')}
                      </div>
                      <div style="font-size: 0.85rem; color: #94a3b8; text-align: center; margin-top: 10px;">
                          ( 使用提示：${hintsCount} 次 )
                      </div>
                  </div>
              `;
          }
          window.saveScore(user.className, user.name, qID + '_' + tID, "程式與結果配對", seconds, "PASS", stars)
            .then(res => console.log("成績上傳完成:", res));
      }
  }

  setupNextLevelButton();
}

function setupNextLevelButton() {
    const LEVEL_SEQUENCE = [
      { q: 'SETUP', t: 'T01' }, { q: 'Q1', t: 'T01' }, { q: 'Q1', t: 'T02' }, { q: 'Q1', t: 'T03' },
      { q: 'Q2', t: 'T01' }, { q: 'Q2', t: 'T02' }, { q: 'Q2', t: 'T03' }, { q: 'Q3', t: 'T01' },
      { q: 'Q3', t: 'T02' }, { q: 'Q3', t: 'T03' }, { q: 'Q4', t: 'T01' }, { q: 'Q4', t: 'T02' },
      { q: 'Q4', t: 'T03' }, { q: 'Q5', t: 'T01' }, { q: 'Q5', t: 'T02' }, { q: 'Q5', t: 'T03' },
      { q: '1060306', t: 'T01' }, { q: '1060307', t: 'T01' }, { q: '1060308', t: 'T01' }
    ];
    let currentIndex = LEVEL_SEQUENCE.findIndex(l => l.q === qID && l.t === tID);
    const nextBtn = document.getElementById('btn-next-level');
    if (currentIndex >= 0 && currentIndex < LEVEL_SEQUENCE.length - 1) {
        const nextLv = LEVEL_SEQUENCE[currentIndex + 1];
        nextBtn.style.display = 'block';
        nextBtn.onclick = () => {
            window.location.href = `程式與結果配對.html?q=${nextLv.q}&t=${nextLv.t}`;
        };
    } else {
        nextBtn.style.display = 'block';
        nextBtn.innerHTML = '⏭️ 下一練習 (逐行中文注解填空)';
        nextBtn.onclick = () => {
            window.location.href = '逐行中文注解填空.html?q=SETUP&t=T01';
        };
    }
}

function getPortPos(item, side) {
  const arena = document.getElementById('arena');
  const aRect = arena.getBoundingClientRect();
  const iRect = item.getBoundingClientRect();
  const y = iRect.top - aRect.top + iRect.height / 2;
  const x = side === 'left' ? iRect.right - aRect.left - 4 : iRect.left - aRect.left + 4;
  return { x, y };
}

function drawLine(leftEl, rightEl, type) {
  const svg = document.getElementById('lines-canvas');
  const lPos = getPortPos(leftEl,  'left');
  const rPos = getPortPos(rightEl, 'right');
  const cx = (lPos.x + rPos.x) / 2;
  const d  = `M${lPos.x},${lPos.y} C${cx},${lPos.y} ${cx},${rPos.y} ${rPos.x},${rPos.y}`;

  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', d);
  path.setAttribute('fill','none');
  path.setAttribute('stroke-width','3');
  path.setAttribute('stroke-linecap','round');

  if (type === 'matched') {
    path.setAttribute('stroke','var(--line-matched)');
    path.setAttribute('opacity','0.8');
    const len = path.getTotalLength ? path.getTotalLength() : 300;
    path.style.strokeDasharray  = len;
    path.style.strokeDashoffset = len;
    path.style.transition = 'stroke-dashoffset .4s ease';
    svg.appendChild(path);
    requestAnimationFrame(() => { path.style.strokeDashoffset = '0'; });
    lines.push(path);
  } else {
    path.setAttribute('stroke','var(--line-wrong)');
    path.setAttribute('opacity','0.6');
    path.setAttribute('stroke-dasharray','6,4');
    svg.appendChild(path);
    return path;
  }
  return path;
}

function redrawLines() {
  if (isPreview) { drawPreviewLines(); return; }
  const svg = document.getElementById('lines-canvas');
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  lines = [];
  const matchedLefts = document.querySelectorAll('#col-left .item.matched');
  matchedLefts.forEach(lEl => {
    const idx = lEl.dataset.idx;
    const rEl = document.querySelector(`#col-right .item.matched[data-idx="${idx}"]`);
    if (rEl) drawLine(lEl, rEl, 'matched');
  });
}

window.addEventListener('resize', redrawLines);
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-restart').addEventListener('click', () => showPreview());
document.getElementById('btn-again').addEventListener('click', () => showPreview());
document.getElementById('btn-hint').addEventListener('click', onHintClick);

function onHintClick() {
  const leftEls = Array.from(document.querySelectorAll('#col-left .item:not(.matched)'));
  if (leftEls.length === 0) return;

  const lEl = leftEls[0];
  const lIdx = parseInt(lEl.dataset.idx);

  const rightEls = Array.from(document.querySelectorAll('#col-right .item:not(.matched)'));
  const rEl = rightEls.find(el => {
    const rIdx = parseInt(el.dataset.idx);
    return pairs[lIdx].result === pairs[rIdx].result;
  });

  if (lEl && rEl) {
    if (selectedLeft) selectedLeft.classList.remove('selected');
    if (selectedRight) selectedRight.classList.remove('selected');
    selectedLeft = null;
    selectedRight = null;

    lEl.classList.add('matched');
    rEl.classList.add('matched');

    const line = drawLine(lEl, rEl, 'matched');
    if (line) {
        line.style.stroke = "#fbbf24";
        line.style.strokeDasharray = "5,5";
    }
    lEl.style.borderColor = "#fbbf24";
    rEl.style.borderColor = "#fbbf24";

    getAC().resume();
    try { playCorrect(); } catch(e) {}

    matchedCount++;
    totalHintsUsed++;
    document.getElementById('stat-matched').textContent = matchedCount;

    if (matchedCount === pairs.length) {
      clearInterval(timerID);
      setTimeout(showWin, 600);
    }
  }
}
</script>
