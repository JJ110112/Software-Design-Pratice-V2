<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="../favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>術科練習 ── 逐行中文注解填空</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0b0f1a;
  --bg2:     #111827;
  --surface: #1a2035;
  --border:  #2a3550;
  --accent:  #38bdf8;
  --gold:    #fbbf24;
  --green:   #4ade80;
  --red:     #f87171;
  --purple:  #c084fc;
  --orange:  #fb923c;
  --text:    #e2e8f0;
  --muted:   #64748b;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(56,189,248,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* ═══ HEADER ═══ */
.page-header { text-align: center; padding: 32px 20px 20px; }
.badge-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; flex-wrap: wrap; }
.badge {
  font-size: .68rem; font-weight: 900; letter-spacing: .1em; text-transform: uppercase;
  padding: 3px 12px; border-radius: 2px;
}
.badge-blue   { background: rgba(56,189,248,.15);  color: var(--accent);  border: 1px solid rgba(56,189,248,.3); }
.badge-gold   { background: rgba(251,191,36,.12);   color: var(--gold);   border: 1px solid rgba(251,191,36,.3); }
.badge-orange { background: rgba(251,146,60,.12);   color: var(--orange); border: 1px solid rgba(251,146,60,.3); }

/* GAME HEADER */
.game-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; justify-content: center; }
.back-btn { background: transparent; border: 1px solid var(--border); color: var(--muted2, #94a3b8); border-radius: 6px; padding: 6px 14px; font-size: .82rem; cursor: pointer; text-decoration: none; font-family: inherit; transition: all .2s; }
.back-btn:hover { color: var(--text); border-color: var(--muted2, #94a3b8); }
.mode-pill { font-size: .72rem; font-weight: 900; padding: 4px 12px; border-radius: 4px; text-transform: uppercase; letter-spacing: .08em; background: rgba(251, 146, 60, .15); color: var(--orange); border: 1px solid rgba(251, 146, 60, .3); }


/* ═══ LAYOUT ═══ */
.game-section { padding: 0 12px 60px; max-width: 1160px; margin: 0 auto; }

/* ── Two-column layout ── */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 270px;
  gap: 20px;
  align-items: start;
}
@media(max-width:820px) { .main-grid { grid-template-columns: 1fr; } }

.pool-side {
  position: sticky;
  top: 16px;
}
.section-label {
  display: flex; align-items: center; gap: 10px;
  font-size: .75rem; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--muted);
  padding: 0 20px; margin-bottom: 16px;
}
.section-label::before, .section-label::after { content:''; flex:1; height:1px; background: var(--border); }

/* stats */
.stats-bar { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-bottom:20px; }
.stat-chip {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 18px; text-align: center; min-width: 80px;
}
.stat-val { font-family:'JetBrains Mono',monospace; font-size:1.3rem; font-weight:700; color:var(--accent); display:block; }
.stat-lbl { font-size:.65rem; color:var(--muted); margin-top:1px; display:block; }

.instr { text-align:center; font-size:.82rem; color:var(--muted); margin-bottom:18px; line-height:1.7; }
.instr strong { color: var(--accent); }

/* ══════════════════════════════
   CODE TABLE
   ══════════════════════════════ */
.code-table {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(.68rem, 1.9vw, .85rem);
}
.code-row {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  align-items: center;
  border-bottom: 1px solid var(--border);
  transition: background .12s;
  min-height: 44px;
}
.code-row:last-child { border-bottom: none; }
.code-row:hover { background: rgba(255,255,255,.015); }

.ln { /* line number */
  text-align: right;
  padding: 0 8px 0 0;
  color: var(--muted);
  font-size: .68rem;
  user-select: none;
  align-self: center;
}
.code-cell {
  padding: 6px 12px;
  white-space: pre;
  overflow-x: auto;
  color: var(--text);
  align-self: center;
}
/* VB.NET colours */
.kw { color: #93c5fd; }
.cm { color: #64748b; font-style: italic; }
.st { color: #86efac; }
.nm { color: var(--gold); }

/* blank slot */
.blank-cell {
  padding: 5px 10px;
  align-self: center;
  min-width: 220px;
  max-width: 320px;
}
@media(max-width:680px){ .blank-cell { min-width:130px; max-width:200px; } }

.blank-btn {
  width: 100%;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1.5px dashed var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: clamp(.65rem,1.7vw,.78rem);
  text-align: left;
  cursor: pointer;
  transition: border-color .15s, background .15s, color .15s;
  white-space: normal;
  line-height: 1.5;
  position: relative;
}
.blank-btn:hover:not(:disabled) {
  border-color: var(--accent);
  background: rgba(56,189,248,.06);
  color: var(--text);
}
/* states */
.blank-btn.selected {
  border-color: var(--accent);
  border-style: solid;
  background: rgba(56,189,248,.12);
  color: var(--accent);
  animation: pulse-border 1.2s ease infinite;
}
@keyframes pulse-border {
  0%,100% { box-shadow: 0 0 0 0 rgba(56,189,248,.25); }
  50%      { box-shadow: 0 0 0 4px rgba(56,189,248,.10); }
}
.blank-btn.filled {
  border-style: solid;
  border-color: rgba(251,191,36,.5);
  background: rgba(251,191,36,.06);
  color: var(--gold);
}
.blank-btn.state-correct {
  border-color: rgba(74,222,128,.5);
  background: rgba(74,222,128,.09);
  color: var(--green);
  cursor: default;
}
.blank-btn.state-wrong {
  border-color: rgba(248,113,113,.5);
  background: rgba(248,113,113,.09);
  color: var(--red);
  animation: wrongShake .35s ease;
}
@keyframes wrongShake {
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)}
}
.blank-icon {
  font-size: .7rem;
  position: absolute;
  right: 6px; top: 50%;
  transform: translateY(-50%);
}

/* ── hint arrow ── */
.hint-arrow {
  display: none;
  font-size: .68rem;
  color: var(--muted);
  padding: 6px 10px;
  line-height: 1.5;
  font-family: 'Noto Sans TC', sans-serif;
  border-radius: 6px;
  background: rgba(248,113,113,.06);
  border: 1px solid rgba(248,113,113,.2);
  color: var(--red);
  width: 100%;
}
.hint-arrow.show { display: block; }

/* ══════════════════════════════
   OPTIONS POOL
   ══════════════════════════════ */
.pool-label {
  font-size: .75rem; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 10px; text-align: center;
}
.pool-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 0;
}
.pool-grid {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.opt-chip {
  padding: 7px 12px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: clamp(.66rem, 1.6vw, .78rem);
  cursor: pointer;
  transition: border-color .15s, background .15s, transform .12s;
  user-select: none;
  line-height: 1.5;
  width: 100%;
  text-align: left;
}
.opt-chip:hover:not(.used) {
  border-color: var(--accent);
  background: rgba(56,189,248,.08);
  transform: translateY(-1px);
}
.opt-chip.selected-opt {
  border-color: var(--accent);
  background: rgba(56,189,248,.15);
  color: var(--accent);
}
.opt-chip.used {
  opacity: .22;
  cursor: default;
  text-decoration: line-through;
}

/* ── inform strip ── */
#info-strip {
  display: none;
  border-radius: 8px; padding: 12px 18px;
  font-size: .84rem; line-height: 1.8; margin-bottom: 16px; text-align: center;
}
#info-strip.show { display: block; }
#info-strip.ok   { background: rgba(74,222,128,.08); border:1px solid rgba(74,222,128,.3); color:var(--green); }
#info-strip.bad  { background: rgba(248,113,113,.06); border:1px solid rgba(248,113,113,.3); color:var(--red); }
#info-strip.tip  { background: rgba(251,191,36,.07); border:1px solid rgba(251,191,36,.3); color:var(--gold); }

/* ── buttons ── */
.btn-row { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.btn {
  font-family:'Noto Sans TC',sans-serif; font-weight:700; font-size:.88rem;
  padding:10px 28px; border-radius:6px; border:none; cursor:pointer; transition:all .2s;
}
.btn-primary { background:var(--accent); color:#000; }
.btn-primary:hover { background:#7dd3fc; transform:translateY(-2px); }
.btn-ghost   { background:transparent; color:var(--muted); border:1px solid var(--border); }
.btn-ghost:hover { color:var(--text); border-color:var(--muted); }
.btn-gold    { background:var(--gold); color:#000; }
.btn-gold:hover { background:#fcd34d; transform:translateY(-2px); }

/* ═══ OVERLAY ═══ */
#overlay {
  display:none; position:fixed; inset:0;
  background:rgba(11,15,26,.88); backdrop-filter:blur(6px);
  z-index:100; align-items:center; justify-content:center;
}
#overlay.show { display:flex; }
.overlay-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:44px 52px; text-align:center;
  max-width:420px; width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  animation:popIn .4s cubic-bezier(.4,0,.2,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.overlay-card .big-emoji { font-size:3.2rem; margin-bottom:12px; }
.overlay-card h2 { font-size:1.7rem; font-weight:900; margin-bottom:8px; }
.overlay-card p  { color:var(--muted); margin-bottom:6px; font-size:.9rem; }
.score-display {
  font-family:'JetBrains Mono',monospace; color:var(--green);
  font-size:1rem; margin:16px 0 24px;
  background:rgba(74,222,128,.08); border:1px solid rgba(74,222,128,.2);
  border-radius:6px; padding:12px;
}
</style>

</div>

<!-- ═══ OVERLAY ═══ -->
<div id="overlay">
  <div class="overlay-card">
    <div class="big-emoji">🎉</div>
    <h2>全部填對了！</h2>
    <p>你已完全掌握 Q1 迴文判斷每行的中文意涵！</p>
    <div class="score-display" id="final-score"></div>
    <div style="display:flex; justify-content:center; align-items:center; gap:12px; margin-top:20px; flex-wrap:wrap;">
        <button class="btn btn-primary" id="btn-again">再挑戰一次</button>
        <button class="btn btn-primary" id="btn-next-level" style="display:none;">⏭️ 下一關</button>
    </div>

<script src="../js/users.js"></script>
<script type="module" src="../js/api.js?v=10"></script>
<script src="../js/quiz_data.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const qID = urlParams.get('q') || 'Q1';
const tID = urlParams.get('t') || 'T01';

// 設定 UI
window.addEventListener('load', () => {
    if (QUIZ_DATA[qID]) {
        let labelText = `${qID} ${QUIZ_DATA[qID].title} (${tID})`;
        document.querySelector('h1').innerHTML = `${qID} ${QUIZ_DATA[qID].title}<br><em>逐行中文注解填空 (${tID})</em>`;
        document.getElementById('mode-pill').textContent = labelText;
        if(document.getElementById('topic-badge')) document.getElementById('topic-badge').textContent = `${qID} · ${QUIZ_DATA[qID].title}`;
    }
});

// BACK
document.getElementById('btn-back').addEventListener('click', (e) => {
    e.preventDefault();
    window.location.href = `../index.html?q=${qID}&t=${tID}`;
});

// ══════════════════════════════════════
//  Q1 完整程式行 + 正確中文注解
// ══════════════════════════════════════
let currentIndent = 4;
const LINES = generateSteps(qID, tID).map(step => {
    let raw = step.code.trim();
    
    if (raw.startsWith("End ") || raw.startsWith("Next") || raw.startsWith("Loop")) {
        currentIndent = Math.max(0, currentIndent - 4);
    } else if (raw.startsWith("Else")) {
        currentIndent = Math.max(0, currentIndent - 4);
    }
    
    const obj = {
        code: " ".repeat(currentIndent) + raw,
        zh: step.zh
    };
    
    if (raw.startsWith("Private Sub") || raw.startsWith("For ") || raw.startsWith("If ") || raw.startsWith("Do")) {
        currentIndent += 4;
    } else if (raw.startsWith("Else")) {
        currentIndent += 4;
    }
    
    return obj;
});

// ══════════ sound ══════════
const AC = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAC() { if (!audioCtx) audioCtx = new AC(); return audioCtx; }

function playClick() {
  try {
    const ctx = getAC();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = 660;
    const t = ctx.currentTime;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.12, t + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    osc.start(t); osc.stop(t + 0.11);
  } catch(e) {}
}
function playFill() {
  try {
    const ctx = getAC();
    [[440, 0],[550, 0.08]].forEach(([freq, when]) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      const t = ctx.currentTime + when;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.2, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      osc.start(t); osc.stop(t + 0.19);
    });
  } catch(e) {}
}
function playCorrect() {
  try {
    const ctx = getAC();
    [[523.25,0],[783.99,0.13]].forEach(([freq,when]) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      const t = ctx.currentTime + when;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.28,t+.01);
      gain.gain.exponentialRampToValueAtTime(0.001,t+.32);
      osc.start(t); osc.stop(t+.33);
    });
  } catch(e) {}
}
function playWrong() {
  try {
    const ctx = getAC();
    [[220,0],[180,0.1]].forEach(([freq,when]) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sawtooth'; osc.frequency.value = freq;
      const t = ctx.currentTime + when;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.18,t+.01);
      gain.gain.exponentialRampToValueAtTime(0.001,t+.22);
      osc.start(t); osc.stop(t+.23);
    });
  } catch(e) {}
}
function playWin() {
  try {
    const ctx = getAC();
    [[523.25,0],[659.25,.15],[783.99,.30],[1046.50,.45]].forEach(([freq,when]) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      const t = ctx.currentTime + when;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.30,t+.02);
      gain.gain.exponentialRampToValueAtTime(0.001,t+.45);
      osc.start(t); osc.stop(t+.46);
    });
    const sh = ctx.createOscillator(), sg = ctx.createGain();
    sh.connect(sg); sg.connect(ctx.destination);
    sh.type = 'sine'; sh.frequency.value = 2093;
    const st = ctx.currentTime + .70;
    sg.gain.setValueAtTime(0,st); sg.gain.linearRampToValueAtTime(0.15,st+.02);
    sg.gain.exponentialRampToValueAtTime(0.001,st+.6);
    sh.start(st); sh.stop(st+.61);
  } catch(e) {}
}

// ══════════ state ══════════
let answers       = new Array(LINES.length).fill(null); // user's chosen zh per line
let selectedBlank = null;   // index of currently selected blank (null = none)
let selectedOpt   = null;   // text of currently selected option (null = none)
let checkCount    = 0;
let seconds       = 0;
let timerID       = null;
let locked        = false;  // true after full-correct check

// shuffle helper
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// pool of unique option texts (shuffled once at start)
let poolOrder = [];

// ══════════ VB.NET highlight ══════════
function hl(raw) {
  const kwds = ['Private','Sub','End','Dim','As','New','For','To','If','Then','Exit','Next','String','Integer'];
  let s = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s = s.replace(/(&#39;[^<]*|'[^<]*)/g, m => `<span class="cm">${m}</span>`);
  if (!s.includes('class="cm"')) {
    s = s.replace(/"([^"]*)"/g, (_,g) => `<span class="st">"${g}"</span>`);
    kwds.forEach(k => { s = s.replace(new RegExp(`\\b${k}\\b`,'g'), `<span class="kw">${k}</span>`); });
    s = s.replace(/\b(\d+)\b/g, '<span class="nm">$1</span>');
  }
  return s;
}

// ══════════ BUILD UI ══════════
function buildTable() {
  const table = document.getElementById('code-table');
  table.innerHTML = '';

  LINES.forEach((ln, idx) => {
    const row = document.createElement('div');
    row.className = 'code-row';

    // line number
    const lnEl = document.createElement('div');
    lnEl.className = 'ln';
    lnEl.textContent = idx + 1;

    // code
    const codeEl = document.createElement('div');
    codeEl.className = 'code-cell';
    codeEl.innerHTML = hl(ln.code);

    // blank
    const blankCell = document.createElement('div');
    blankCell.className = 'blank-cell';

    const btn = document.createElement('button');
    btn.className = 'blank-btn';
    btn.id = `blank-${idx}`;
    btn.innerHTML = `<span class="blank-text">── 點此選取 ──</span><span class="blank-icon"></span>`;
    btn.addEventListener('click', () => onBlankClick(idx));
    blankCell.appendChild(btn);

    row.appendChild(lnEl);
    row.appendChild(codeEl);
    row.appendChild(blankCell);
    table.appendChild(row);
  });
}

function buildPool() {
  // Collect all unique zh values
  const allZh = LINES.map((l, i) => ({ id: i, text: l.zh }));
  poolOrder = shuffle([...allZh]);

  const grid = document.getElementById('pool-grid');
  grid.innerHTML = '';
  poolOrder.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'opt-chip';
    chip.dataset.id = item.id;
    chip.dataset.opt = item.text;
    chip.textContent = item.text;
    chip.addEventListener('click', () => onOptClick(item.id, item.text));
    grid.appendChild(chip);
  });
}

// ══════════ INTERACTIONS ══════════
function onBlankClick(idx) {
  if (locked) return;
  playClick();

  // If clicking the already-selected blank → deselect
  if (selectedBlank === idx && answers[idx] === null) {
    selectedBlank = null;
    updateBlankUI(idx);
    clearInfo();
    return;
  }

  // If blank already has a value → clear it back to pool, then select
  if (answers[idx] !== null) {
    const freed = answers[idx];
    answers[idx] = null;
    updateStats();
    // un-use that chip
    setChipUsed(freed.id, false);
    // now select this blank
    if (selectedBlank !== null) updateBlankUI(selectedBlank);
    selectedBlank = idx;
    updateBlankUI(idx);
    showInfo('tip', `💡 已清除，請從右側選項欄重新選擇`);
    return;
  }

  // Normal: select this blank
  if (selectedBlank !== null) updateBlankUI(selectedBlank);
  selectedBlank = idx;
  updateBlankUI(idx);

  // If an option is already selected, fill immediately
  if (selectedOpt !== null) {
    fillBlank(idx, selectedOpt);
    return;
  }
  showInfo('tip', `👉 請從右側選項欄點選對應的中文注解`);
}

function onOptClick(id, text) {
  if (locked) return;

  // If chip is used (already placed somewhere), ignore
  const chip = document.querySelector(`.opt-chip[data-id="${id}"]`);
  if (!chip || chip.classList.contains('used')) return;

  // Toggle selection of the chip
  if (selectedOpt && selectedOpt.id === id) {
    // deselect
    selectedOpt = null;
    chip.classList.remove('selected-opt');
    return;
  }

  // Deselect previous chip if any
  if (selectedOpt !== null) {
    const prev = document.querySelector(`.opt-chip[data-id="${selectedOpt.id}"]`);
    if (prev) prev.classList.remove('selected-opt');
  }

  selectedOpt = { id, text };
  chip.classList.add('selected-opt');
  playClick();

  // If a blank is already selected, fill it
  if (selectedBlank !== null) {
    fillBlank(selectedBlank, selectedOpt);
    return;
  }
  showInfo('tip', `👈 請點擊左側程式碼列的空格來填入`);
}

function fillBlank(idx, optObj) {
  answers[idx] = optObj;
  setChipUsed(optObj.id, true);

  // reset opt selection
  if (selectedOpt !== null) {
    const chip = document.querySelector(`.opt-chip[data-id="${selectedOpt.id}"]`);
    if (chip) chip.classList.remove('selected-opt');
    selectedOpt = null;
  }

  selectedBlank = null;
  updateBlankUI(idx);
  updateStats();
  playFill();
  clearInfo();
}

// ══════════ UI helpers ══════════
function updateBlankUI(idx) {
  const btn = document.getElementById(`blank-${idx}`);
  if (!btn) return;
  const textEl = btn.querySelector('.blank-text');
  const iconEl = btn.querySelector('.blank-icon');

  btn.classList.remove('selected','filled','state-correct','state-wrong');

  if (idx === selectedBlank) {
    btn.classList.add('selected');
    textEl.textContent = answers[idx] ? answers[idx].text : '── 選取中 ──';
    iconEl.textContent = '✏️';
  } else if (answers[idx]) {
    btn.classList.add('filled');
    textEl.textContent = answers[idx].text;
    iconEl.textContent = '✏';
  } else {
    textEl.textContent = '── 點此選取 ──';
    iconEl.textContent = '';
  }
}

function setChipUsed(id, used) {
  const chip = document.querySelector(`.opt-chip[data-id="${id}"]`);
  if (!chip) return;
  chip.classList.toggle('used', used);
  if (used) chip.classList.remove('selected-opt');
}

function updateStats() {
  const filled = answers.filter(v => v !== null).length;
  document.getElementById('stat-filled').textContent = filled;
}

function showInfo(type, msg) {
  const el = document.getElementById('info-strip');
  el.className = `info-strip show ${type}`;
  el.textContent = msg;
  el.style.display = 'block';
}
function clearInfo() {
  const el = document.getElementById('info-strip');
  el.style.display = 'none';
  el.className = 'info-strip';
}

// ══════════ CHECK ══════════
document.getElementById('btn-check').addEventListener('click', () => {
  const unfilled = answers.filter(v => v === null).length;
  if (unfilled > 0) {
    showInfo('bad', `⚠️ 還有 ${unfilled} 行尚未填入，請完成所有空格再檢查！`);
    playWrong();
    return;
  }

  checkCount++;
  document.getElementById('stat-checks').textContent = checkCount;

  let correctCount = 0;
  LINES.forEach((ln, idx) => {
    const btn = document.getElementById(`blank-${idx}`);
    btn.classList.remove('selected','filled','state-correct','state-wrong');
    const iconEl = btn.querySelector('.blank-icon');
    if (answers[idx] && answers[idx].text === ln.zh) {
      btn.classList.add('state-correct');
      iconEl.textContent = '✓';
      correctCount++;
    } else {
      btn.classList.add('state-wrong');
      iconEl.textContent = '✗';
    }
  });

  document.getElementById('stat-correct').textContent = correctCount;

  if (correctCount === LINES.length) {
    locked = true;
    // disable all blank btns
    document.querySelectorAll('.blank-btn').forEach(b => b.disabled = true);
    showInfo('ok', `🎉 全部 ${LINES.length} 行全部正確！太厲害了！`);
    playWin();
    clearInterval(timerID);
    setTimeout(showWin, 900);
  } else {
    const wrong = LINES.length - correctCount;
    showInfo('bad', `✅ ${correctCount} / ${LINES.length} 正確　❌ ${wrong} 行有誤，紅色行請重新選擇！`);
    if (correctCount >= LINES.length / 2) playCorrect();
    else playWrong();

    // Auto-clear wrong answers so user can re-fill
    setTimeout(() => {
      LINES.forEach((ln, idx) => {
        if (!answers[idx]) return;
        if (answers[idx].text !== ln.zh) {
          const freedObj = answers[idx];
          answers[idx] = null;
          if (freedObj) setChipUsed(freedObj.id, false);
          updateBlankUI(idx);
        }
      });
      updateStats();
    }, 1200);
  }
});

// ══════════ HINT ══════════
document.getElementById('btn-hint').addEventListener('click', () => {
  if (locked) return;
  // Find first unfilled or wrong blank
  for (let idx = 0; idx < LINES.length; idx++) {
    if (answers[idx] === null || answers[idx].text !== LINES[idx].zh) {
      showInfo('tip', `💡 第 ${idx+1} 行的注解是：「${LINES[idx].zh}」`);
      // Visually highlight that blank
      if (selectedBlank !== null) updateBlankUI(selectedBlank);
      selectedBlank = idx;
      updateBlankUI(idx);
      document.getElementById(`blank-${idx}`).scrollIntoView({ behavior:'smooth', block:'center' });
      return;
    }
  }
  showInfo('ok', '✅ 所有空格已填正確！');
});

// ══════════ WIN ══════════
function showWin() {
  const pct = Math.min(Math.round(100 / checkCount), 100);
  document.getElementById('final-score').innerHTML =
    `⏱ 用時 ${seconds} 秒　　🔍 檢查 ${checkCount} 次<br>🎯 效率分 ${pct}%`;
  document.getElementById('overlay').classList.add('show');

  // 將成績送往雲端 (若已登入且及格)
  if (typeof getCurrentUser === 'function') {
      const user = getCurrentUser();
      if (user && pct >= 60 && typeof window.saveScore === 'function') {
          
          let stars = 3;
          if (typeof totalHintsUsed !== 'undefined') {
              if (totalHintsUsed > 0 && totalHintsUsed <= 3) stars = 2;
              if (totalHintsUsed > 3) stars = 1;
          }
          let finalScoreSpan = document.getElementById('final-score');
          if (finalScoreSpan) {
              finalScoreSpan.style.width = "calc(100% + 40px)";
              finalScoreSpan.style.marginLeft = "-20px";
              finalScoreSpan.style.padding = "20px 10px 25px 10px";
              finalScoreSpan.style.boxSizing = "border-box";
              const hintsCount = typeof totalHintsUsed !== 'undefined' ? totalHintsUsed : 0;
              let originHtml = finalScoreSpan.innerHTML;
              
              // 移除舊版的星星 UI
              originHtml = originHtml.replace(/<div class="star-display-container"([\s\S]*?)<\/div>\s*<\/div>/g, '');
              originHtml = originHtml.replace(/<br>⭐ 提示.*顆/g, '');
              
              // 修正折行問題，將各個統計項目包裝在 nowrap 中
              originHtml = originHtml.replace(/(⏱ 用時.*?秒)/g, '<span style="white-space:nowrap;">$1</span>');
              originHtml = originHtml.replace(/(❌ 錯誤.*?次)/g, '<span style="white-space:nowrap;">$1</span>');
              originHtml = originHtml.replace(/(🎯 正確率.*?%)/g, '<span style="white-space:nowrap;">$1</span>');
              originHtml = originHtml.replace(/　　/g, ' &nbsp;&nbsp; ');

              finalScoreSpan.innerHTML = originHtml + `
                  <div class="star-display-container" style="margin-top: 20px; width: 100%; display: flex; flex-direction: column; align-items: center;">
                      <div style="display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 5px; flex-wrap: nowrap;">
                          ${Array(3).fill(0).map((_, i) => `<span style="font-size: 2.5rem; filter: ${i < stars ? 'drop-shadow(0 0 12px rgba(251,191,36,0.8))' : 'grayscale(100%) opacity(20%)'}; transform: scale(${i < stars ? 1.1 : 1}); transition: all 0.3s ease; line-height: 1;">⭐</span>`).join('')}
                      </div>
                      <div style="font-size: 0.85rem; color: #94a3b8; text-align: center; margin-top: 10px;">
                          ( 使用提示：${hintsCount} 次 )
                      </div>
                  </div>
              `;
          }
          window.saveScore(user.className, user.name, qID + '_' + tID, "逐行中文注解填空", seconds, "PASS", stars)
            .then(res => console.log("成績上傳完成:", res));
      }
  }
}

// ══════════ RESET ══════════
function doReset() {
  answers = new Array(LINES.length).fill(null);
  selectedBlank = null;
  selectedOpt   = null;
  checkCount    = 0;
  locked        = false;
  seconds       = 0;
  clearInterval(timerID);

  document.getElementById('stat-correct').textContent = '—';
  document.getElementById('stat-checks').textContent  = '0';
  document.getElementById('stat-filled').textContent  = '0';
  document.getElementById('stat-timer').textContent   = '0s';
  document.getElementById('overlay').classList.remove('show');
  clearInfo();

  // re-build pool with new shuffle
  buildPool();

  // reset all blank btns
  LINES.forEach((_, idx) => {
    const btn = document.getElementById(`blank-${idx}`);
    if (btn) {
      btn.disabled = false;
      btn.classList.remove('selected','filled','state-correct','state-wrong');
      btn.querySelector('.blank-text').textContent = '── 點此選取 ──';
      btn.querySelector('.blank-icon').textContent = '';
    }
  });

  startTimer();
}

document.getElementById('btn-reset').addEventListener('click', doReset);
document.getElementById('btn-again').addEventListener('click', doReset);

// ══════════ timer ══════════
function startTimer() {
  clearInterval(timerID);
  timerID = setInterval(() => {
    seconds++;
    document.getElementById('stat-timer').textContent = seconds + 's';
  }, 1000);
}

// ══════════ CSS.escape polyfill ══════════
if (typeof CSS === 'undefined' || !CSS.escape) {
  window.CSS = window.CSS || {};
  CSS.escape = function(v) {
    return v.replace(/[^\w-]/g, c => '\\' + c);
  };
}

// ══════════ BOOT ══════════
document.getElementById('stat-total').textContent = LINES.length;
buildTable();
buildPool();
startTimer();
</script>
